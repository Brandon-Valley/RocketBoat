<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Line Boat Slingshot Battle</title>
<style>
:root{--ink:#171717;--paper:#f6f1e6;--water:#cceff8;--orange:#ffb13d;--red:#ff6868;--green:#67bd6a}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--paper);color:var(--ink);font-family:ui-rounded,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:none;overscroll-behavior:none;user-select:none}body{background:repeating-linear-gradient(45deg,rgba(0,0,0,.045) 0 2px,transparent 2px 28px),var(--paper)}#game{position:fixed;inset:0;width:100vw;height:100vh;display:block;z-index:1}#hud{position:fixed;left:0;right:0;top:0;z-index:3;padding:max(8px,env(safe-area-inset-top)) 8px 6px;display:grid;gap:6px}.toolbar{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px}button{appearance:none;border:4px solid var(--ink);background:#fffdf5;color:var(--ink);border-radius:999px;padding:9px 12px;font-weight:950;font-size:clamp(14px,3.8vw,18px);box-shadow:5px 5px 0 rgba(0,0,0,.17)}button.active{background:var(--orange)}button:active{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(0,0,0,.17)}#stageMenuBtn{width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.statusBox{display:grid;gap:6px}.hpRow{display:grid;grid-template-columns:auto 1fr auto;gap:7px;align-items:center}.hpName,.hpValue{font-weight:950;font-size:clamp(13px,3.5vw,17px)}.hpName{min-width:44px}.barOuter{height:14px;border:3px solid var(--ink);border-radius:999px;overflow:hidden;background:white}.barInner{height:100%;width:100%;background:var(--green);transform-origin:left center}#enemyHp{background:var(--red)}.stagePopover{position:fixed;z-index:6;display:none;left:8px;right:8px;top:calc(max(8px,env(safe-area-inset-top)) + 48px);border-radius:20px;padding:10px;border:4px solid var(--ink);background:rgba(246,241,230,.98);box-shadow:7px 7px 0 rgba(0,0,0,.16)}.stagePopover.show{display:block}.stagePopoverHeader{font-weight:950;font-size:15px;margin:0 0 8px}.stageOption{width:100%;margin:0 0 8px;text-align:left;border-radius:18px;padding:10px 12px}.stageOption small{display:block;margin-top:3px;font-size:11px;opacity:.72;font-weight:800}.overlay{position:fixed;inset:0;z-index:5;display:none;background:rgba(23,23,23,.22)}.overlay.show{display:block}.modal{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);max-width:460px;width:calc(100vw - 32px);background:var(--paper);border:5px solid var(--ink);border-radius:24px;box-shadow:10px 10px 0 rgba(0,0,0,.22);padding:22px;text-align:center}.modal h2{margin:0 0 8px;font-size:30px}.modal p{margin:0 0 16px;font-weight:800}.hint{position:fixed;left:10px;right:10px;bottom:8px;text-align:center;font-weight:950;z-index:2;opacity:.76;pointer-events:none}#version{position:fixed;right:8px;bottom:8px;font-size:10px;opacity:.45;z-index:4}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"><div class="toolbar"><button id="stageMenuBtn">Change stage: <span class="stageMenuName" style="color:#087ca7">Open Water</span></button><button id="resetBtn">Reset</button></div><div class="statusBox"><div class="hpRow"><div class="hpName">YOU</div><div class="barOuter"><div class="barInner" id="playerHp"></div></div><div class="hpValue" id="playerHpText">100</div></div><div class="hpRow"><div class="hpName">CPU</div><div class="barOuter"><div class="barInner" id="enemyHp"></div></div><div class="hpValue" id="enemyHpText">100</div></div></div></div>
<div class="stagePopover" id="stagePopover"><div class="stagePopoverHeader">Choose a stage</div><button class="stageOption active" data-stage="0">1 <span style="color:#087ca7">Open Water</span><small>Just boats, water, and ricochets.</small></button><button class="stageOption" data-stage="1">2 <span style="color:#7a5c20">Mountain</span><small>Center underwater mountain that sticks above the surface.</small></button><button class="stageOption" data-stage="2">3 <span style="color:#6741d9">Wave Tank</span><small>Extra rolling water motion for rougher aim.</small></button></div>
<div class="overlay" id="overlay"><div class="modal"><h2 id="overlayTitle">You win!</h2><p id="overlayText">The enemy boat sank.</p><button id="playAgainBtn">Play Again</button></div></div>
<div class="hint">Drag anywhere to slingshot. Use BOOST pad to rocket around. Stage menu is at top.</div><div id="version">boatgame-83 pushed</div>
<script>
(function(){"use strict";const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),hud=document.getElementById('hud'),stageMenuBtn=document.getElementById('stageMenuBtn'),stagePopover=document.getElementById('stagePopover'),stageButtons=[...document.querySelectorAll('[data-stage]')],resetBtn=document.getElementById('resetBtn'),playAgainBtn=document.getElementById('playAgainBtn'),overlay=document.getElementById('overlay'),overlayTitle=document.getElementById('overlayTitle'),overlayText=document.getElementById('overlayText'),playerHp=document.getElementById('playerHp'),enemyHp=document.getElementById('enemyHp'),playerHpText=document.getElementById('playerHpText'),enemyHpText=document.getElementById('enemyHpText');let W,H,DPR,waterTop,stage=0,boats=[],shots=[],rings=[],blocks=[],last=performance.now(),pointer={down:false,x:0,y:0,sx:0,sy:0,id:null},boost={active:false,x:0,y:0,dx:0,dy:0,id:null,mag:0},keys={up:false,down:false,left:false,right:false},enemyTimer=1,gameOver=false;const names=['Open Water','Mountain','Wave Tank'],colors=['#087ca7','#7a5c20','#6741d9'];function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function lerp(a,b,t){return a+(b-a)*t}function rand(a,b){return a+Math.random()*(b-a)}function d(a,b,c,e){return Math.hypot(a-c,b-e)}function waterY(x){let n=performance.now();let y=waterTop+Math.sin(x*.018+n*.0011)*7+Math.sin(x*.047-n*.0017)*3;if(stage===2)y+=Math.sin(x*.025+n*.0035)*13;return y}function boatSize(){return clamp(W*(W<=760?.026:.03),W<=760?16:24,W<=760?24:42)}function pad(){return{x:W-(W<=760?76:92),y:H-(W<=760?86:96),r:W<=760?46:56}}function resize(){DPR=clamp(devicePixelRatio||1,1,2);W=Math.max(320,innerWidth||393);H=Math.max(560,innerHeight||852);canvas.width=Math.round(W*DPR);canvas.height=Math.round(H*DPR);canvas.style.width=W+'px';canvas.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);waterTop=Math.min(Math.max((hud.getBoundingClientRect().bottom||150)+18,H*.67),H-150);reset(false)}function reset(){let s=boatSize();boats=[{x:W*.22,y:waterY(W*.22)-s*.35,vx:0,vy:0,a:0,av:0,hp:100,face:1,color:'#ffb13d'},{x:W*.78,y:waterY(W*.78)-s*.35,vx:0,vy:0,a:0,av:0,hp:100,face:-1,color:'#ff6868'}];shots=[];rings=[];blocks=[];let n=W<=760?4:6;for(let i=0;i<n;i++){let x=lerp(70,W-70,(i+.5)/n)+Math.sin(i*2.31)*18;if(stage===1&&Math.abs(x-W/2)<W*.18)x+=x<W/2?-W*.18:W*.18;blocks.push({x:clamp(x,45,W-45),y:lerp(waterTop+62,H-92,(i%4)/3),r:clamp(W*.03,15,30),live:true})}enemyTimer=1.1;gameOver=false;overlay.classList.remove('show');updateHud()}function updateHud(){playerHp.style.transform='scaleX('+boats[0].hp/100+')';enemyHp.style.transform='scaleX('+boats[1].hp/100+')';playerHpText.textContent=Math.ceil(boats[0].hp);enemyHpText.textContent=Math.ceil(boats[1].hp)}function check(){if(gameOver)return;if(boats[0].hp<=0||boats[1].hp<=0){gameOver=true;overlayTitle.textContent=boats[1].hp<=0?'You win!':'You sank!';overlayText.textContent=boats[1].hp<=0?'The enemy boat sank.':'The CPU sank your boat.';overlay.classList.add('show')}}function boostControl(){let x=0,y=0,p=0;if(boost.active){let l=Math.hypot(boost.dx,boost.dy)||1;x=boost.dx/l;y=boost.dy/l;p=boost.mag}else{x=(keys.right?1:0)-(keys.left?1:0);y=(keys.down?1:0)-(keys.up?1:0);let l=Math.hypot(x,y);if(l){x/=l;y/=l;p=1}}return{x,y,p}}function setBoost(q){let p=pad(),dx=q.x-p.x,dy=q.y-p.y,l=Math.hypot(dx,dy)||1,m=p.r*.9,c=Math.min(l,m);boost.x=q.x;boost.y=q.y;boost.dx=dx/l*c;boost.dy=dy/l*c;boost.mag=c/m}function anchor(b){let s=boatSize();return{x:b.x+b.face*s*.4,y:b.y-s*.75}}function shot(owner,ux,uy,power){let b=boats[owner],a=owner?{x:b.x-b.face*boatSize()*.6,y:b.y-boatSize()*.7}:anchor(b);shots.push({x:a.x,y:a.y,vx:ux*(7+power*.06)+b.vx*.25,vy:uy*(7+power*.06)+b.vy*.15,r:clamp(boatSize()*.17,5,9),owner,life:5,bounce:0});b.vx-=ux*.25;b.vy-=uy*.18;b.av-=ux*.015}function hit(cx,cy){rings.push({x:cx,y:waterY(cx),life:.7,max:.7,power:30});for(let b of boats){let q=Math.max(1,d(cx,cy,b.x,b.y)),f=clamp(1-q/145,0,1);if(f){b.hp=clamp(b.hp-18*f,0,100);b.vx+=(b.x-cx)/q*4*f;b.vy+=(b.y-cy)/q*4*f-2.2*f;b.av+=clamp((b.x-cx)/145,-1,1)*.16}}updateHud();check()}function mountainHit(x,y,r){if(stage!==1)return false;let left=W*.38,right=W*.62,top=waterTop-18,bottom=H+30,t=clamp((x-left)/(right-left),0,1),surf=lerp(bottom,top,1-Math.abs(t-.5)*2);return x+r>left&&x-r<right&&y+r>surf&&y-r<bottom}function update(dt,now){if(!gameOver){for(let i=0;i<2;i++){let b=boats[i],ctrl=i?enemyBoost(b,now):boostControl();b.vx+=ctrl.x*.19*ctrl.p*dt*60;b.vy+=ctrl.y*.19*ctrl.p*dt*60;b.vy+=.13*dt*60;b.x+=b.vx*dt*60;b.y+=b.vy*dt*60;b.vx*=Math.pow(.99,dt*60);b.vy*=Math.pow(.995,dt*60);b.a+=b.av*dt*60;b.av*=Math.pow(.96,dt*60);let s=boatSize(),surf=waterY(b.x)-s*.25;if(b.y>surf){b.y=surf;b.vy*=-.18;b.a*=.88;if(Math.abs(b.vy)>1)rings.push({x:b.x,y:surf,life:.42,max:.42})}if(b.x<s){b.x=s;b.vx=Math.abs(b.vx)}if(b.x>W-s){b.x=W-s;b.vx=-Math.abs(b.vx)}}enemyTimer-=dt;if(enemyTimer<=0){let e=boats[1],p=boats[0],dx=p.x-e.x,dy=p.y-e.y-40,l=Math.max(1,Math.hypot(dx,dy));shot(1,dx/l,dy/l,rand(75,115));enemyTimer=rand(1.1,2.2)}}for(let sh of shots){sh.life-=dt;sh.vy+=.14*dt*60;sh.x+=sh.vx*dt*60;sh.y+=sh.vy*dt*60;if(mountainHit(sh.x,sh.y,sh.r)){sh.vx*=-.72;sh.vy*=-.62;sh.bounce++;if(sh.bounce>2)sh.life=0}if(sh.y+sh.r>waterY(sh.x)){sh.life=0;rings.push({x:sh.x,y:waterY(sh.x),life:.55,max:.55})}for(let i=0;i<2;i++){let b=boats[i];if(i!==sh.owner&&d(sh.x,sh.y,b.x,b.y)<boatSize()*.75+sh.r){b.hp=clamp(b.hp-12,0,100);b.vx+=sh.vx*.08;b.vy+=sh.vy*.05;b.av+=sh.vx*.006;sh.life=0;updateHud();check()}}for(let m of blocks){if(m.live&&d(sh.x,sh.y,m.x,m.y)<m.r+sh.r){m.live=false;sh.life=0;hit(m.x,m.y)}}if(sh.x<-80||sh.x>W+80||sh.y>H+100)sh.life=0}shots=shots.filter(s=>s.life>0);rings=rings.filter(r=>(r.life-=dt)>0)}function enemyBoost(e,now){let tx=W*.76+Math.sin(now*.0011)*W*.045,ty=waterY(e.x)-boatSize()*2-18,dx=tx-e.x,dy=ty-e.y,l=Math.hypot(dx,dy);return l<5?{x:0,y:0,p:0}:{x:dx/l,y:dy/l,p:clamp(l/80,.35,1)}}function draw(){ctx.clearRect(0,0,W,H);ctx.fillStyle='#f6f1e6';ctx.fillRect(0,0,W,H);drawWater();if(stage===1)drawMountain();drawBlocks();boats.forEach(drawBoat);drawShots();drawRings();drawAim();drawPad()}function drawWater(){ctx.fillStyle='#cceff8';ctx.beginPath();ctx.moveTo(0,waterY(0));for(let x=0;x<=W;x+=8)ctx.lineTo(x,waterY(x));ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();ctx.strokeStyle='#171717';ctx.lineWidth=3;ctx.stroke()}function drawMountain(){ctx.fillStyle='#7a5c20';ctx.strokeStyle='#171717';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(W*.38,H+30);ctx.lineTo(W*.5,waterTop-18);ctx.lineTo(W*.62,H+30);ctx.closePath();ctx.fill();ctx.stroke()}function drawBlocks(){for(let m of blocks){if(!m.live)continue;ctx.strokeStyle='#171717';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(m.x,H+10);ctx.lineTo(m.x,m.y);ctx.stroke();ctx.fillStyle='#333';ctx.beginPath();ctx.arc(m.x,m.y,m.r,0,7);ctx.fill();ctx.stroke()}}function drawBoat(b){let s=boatSize();ctx.save();ctx.translate(b.x,b.y);ctx.rotate(b.a);ctx.lineWidth=4;ctx.strokeStyle='#171717';ctx.fillStyle=b.color;ctx.beginPath();ctx.moveTo(-s*1.25,0);ctx.quadraticCurveTo(0,s*.82,s*1.25,0);ctx.lineTo(s*.88,s*.34);ctx.lineTo(-s*.88,s*.34);ctx.closePath();ctx.fill();ctx.stroke();ctx.fillStyle='#fff7df';ctx.beginPath();ctx.moveTo(0,-s*1.55);ctx.lineTo(0,-s*.2);ctx.lineTo(s*b.face*.85,-s*.35);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore()}function drawShots(){ctx.fillStyle='#4b4037';ctx.strokeStyle='#171717';ctx.lineWidth=2;for(let sh of shots){ctx.beginPath();ctx.arc(sh.x,sh.y,sh.r,0,7);ctx.fill();ctx.stroke()}}function drawRings(){for(let r of rings){ctx.globalAlpha=clamp(r.life/r.max,0,1);ctx.strokeStyle='#087ca7';ctx.lineWidth=3;ctx.beginPath();ctx.arc(r.x,r.y,(r.max-r.life)*50+6,0,7);ctx.stroke();ctx.globalAlpha=1}}function drawAim(){if(!pointer.down)return;let a=anchor(boats[0]);ctx.strokeStyle='#171717';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(pointer.x,pointer.y);ctx.stroke();ctx.fillStyle='#ffb13d';ctx.beginPath();ctx.arc(pointer.x,pointer.y,10,0,7);ctx.fill();ctx.stroke()}function drawPad(){let p=pad();ctx.fillStyle='rgba(255,253,245,.75)';ctx.strokeStyle='#171717';ctx.lineWidth=4;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,7);ctx.fill();ctx.stroke();ctx.font='950 12px ui-rounded,system-ui';ctx.textAlign='center';ctx.fillStyle='#171717';ctx.fillText('BOOST',p.x,p.y-p.r-8);if(boost.active){ctx.fillStyle='#ffb13d';ctx.beginPath();ctx.arc(boost.x,boost.y,18,0,7);ctx.fill();ctx.stroke()}}function loop(now){let dt=Math.min(.033,(now-last)/1000||.016);last=now;update(dt,now);draw();requestAnimationFrame(loop)}function point(e){return{x:e.clientX,y:e.clientY,id:e.pointerId}}function down(e){let p=point(e),q=pad();if(d(p.x,p.y,q.x,q.y)<=q.r*1.2){boost.active=true;boost.id=e.pointerId;setBoost(p)}else{pointer.down=true;pointer.id=e.pointerId;pointer.x=pointer.sx=p.x;pointer.y=pointer.sy=p.y}e.preventDefault()}function move(e){let p=point(e);if(boost.active&&boost.id===e.pointerId)setBoost(p);if(pointer.down&&pointer.id===e.pointerId){pointer.x=p.x;pointer.y=p.y}e.preventDefault()}function up(e){if(pointer.down&&pointer.id===e.pointerId){let dx=pointer.sx-pointer.x,dy=pointer.sy-pointer.y,p=Math.hypot(dx,dy),l=Math.max(1,p);if(p>18)shot(0,dx/l,dy/l,clamp(p,0,160));pointer.down=false;pointer.id=null}if(boost.active&&boost.id===e.pointerId){boost.active=false;boost.id=null}e.preventDefault()}canvas.addEventListener('pointerdown',down);window.addEventListener('pointermove',move,{passive:false});window.addEventListener('pointerup',up,{passive:false});window.addEventListener('pointercancel',up,{passive:false});stageMenuBtn.onclick=()=>stagePopover.classList.toggle('show');stageButtons.forEach(btn=>btn.onclick=()=>{stage=+btn.dataset.stage;stageButtons.forEach(b=>b.classList.toggle('active',b===btn));stageMenuBtn.innerHTML='Change stage: <span class="stageMenuName" style="color:'+colors[stage]+'">'+names[stage]+'</span>';stagePopover.classList.remove('show');reset()});resetBtn.onclick=()=>reset();playAgainBtn.onclick=()=>reset();window.addEventListener('keydown',e=>{let k=e.key.toLowerCase();if(k==='w'||k==='arrowup')keys.up=true;else if(k==='s'||k==='arrowdown')keys.down=true;else if(k==='a'||k==='arrowleft')keys.left=true;else if(k==='d'||k==='arrowright')keys.right=true});window.addEventListener('keyup',e=>{let k=e.key.toLowerCase();if(k==='w'||k==='arrowup')keys.up=false;else if(k==='s'||k==='arrowdown')keys.down=false;else if(k==='a'||k==='arrowleft')keys.left=false;else if(k==='d'||k==='arrowright')keys.right=false});window.addEventListener('resize',resize);window.addEventListener('orientationchange',()=>setTimeout(resize,250));resize();requestAnimationFrame(loop)})();
</script>
</body>
</html>
