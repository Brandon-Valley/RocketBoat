<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Line Boat Slingshot Battle</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #f6f1e6;
    color: #171717;
    font-family: ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body {
    display: grid;
    place-items: center;
  }
  .loading {
    padding: 22px;
    text-align: center;
    font-weight: 950;
  }
</style>
</head>
<body>
<div class="loading">Loading RocketBoat...</div>
<script>
(function () {
  "use strict";

  const previousUrl = "https://cdn.jsdelivr.net/gh/Brandon-Valley/RocketBoat@a9aa88764fa50f9db95ee9ea30f322f75945039c/index.html";

  function improveMorePillStyle(html) {
    const oldStyle = '.morePill {\\n    width: 100%;\\n    display: flex;\\n    align-items: center;\\n    justify-content: flex-start;\\n    gap: 12px;\\n    text-decoration: none;\\n    margin: 10px 0;\\n    padding: 12px 14px;\\n    text-align: left;\\n  }';
    const newStyle = '.morePill {\\n    appearance: none;\\n    border: 4px solid var(--ink);\\n    background: #fffdf5;\\n    color: var(--ink);\\n    border-radius: 999px;\\n    box-shadow: 5px 5px 0 rgba(0,0,0,.17);\\n    cursor: pointer;\\n    font-weight: 950;\\n    font-size: clamp(14px, 3.8vw, 18px);\\n    width: 100%;\\n    display: flex;\\n    align-items: center;\\n    justify-content: flex-start;\\n    gap: 12px;\\n    text-decoration: none;\\n    margin: 10px 0;\\n    padding: 12px 14px;\\n    text-align: left;\\n  }';
    return html.replace(oldStyle, newStyle);
  }

  fetch(previousUrl, { cache: "no-store" })
    .then(function (response) {
      if (!response.ok) throw new Error("Could not load game source: " + response.status);
      return response.text();
    })
    .then(function (html) {
      document.open();
      document.write(improveMorePillStyle(html));
      document.close();
    })
    .catch(function (error) {
      document.body.innerHTML = '<div class="loading">RocketBoat could not load.<br><small>' + String(error.message || error) + '</small></div>';
      console.error(error);
    });
})();
</script>
</body>
</html>
