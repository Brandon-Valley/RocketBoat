<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Line Boat Slingshot Battle</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #f6f1e6;
    color: #171717;
    font-family: ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body {
    display: grid;
    place-items: center;
  }
  .loading {
    padding: 22px;
    text-align: center;
    font-weight: 950;
  }
</style>
</head>
<body>
<div class="loading">Loading RocketBoat...</div>
<script>
(function () {
  "use strict";

  const sourceUrl = "https://cdn.jsdelivr.net/gh/Brandon-Valley/RocketBoat@2ce225f31fa0212dec3a681364853204f1ba61d4/index.html";
  const repoUrl = "https://github.com/Brandon-Valley/RocketBoat";
  const githubSvg = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .5C5.65.5.5 5.65.5 12c0 5.1 3.29 9.42 7.86 10.95.58.1.79-.25.79-.56v-2.15c-3.2.7-3.87-1.36-3.87-1.36-.52-1.33-1.28-1.68-1.28-1.68-1.05-.72.08-.7.08-.7 1.16.08 1.77 1.19 1.77 1.19 1.03 1.76 2.7 1.25 3.36.96.1-.75.4-1.25.73-1.54-2.56-.29-5.25-1.28-5.25-5.69 0-1.26.45-2.28 1.19-3.09-.12-.29-.52-1.46.11-3.04 0 0 .97-.31 3.17 1.18.92-.26 1.9-.38 2.88-.39.98.01 1.96.13 2.88.39 2.2-1.49 3.17-1.18 3.17-1.18.63 1.58.23 2.75.11 3.04.74.81 1.19 1.83 1.19 3.09 0 4.42-2.7 5.39-5.27 5.68.42.36.79 1.07.79 2.16v3.2c0 .31.21.67.8.56A11.51 11.51 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5Z"/></svg>';

  function patchGameHtml(html) {
    if (html.includes('id="githubBtn"')) return html;

    html = html.replace(
      'grid-template-columns: minmax(0, 1fr) auto;',
      'grid-template-columns: minmax(0, 1fr) auto auto;'
    );

    html = html.replace(
      'button:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 rgba(0,0,0,.17); }',
      'button:active, #githubBtn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 rgba(0,0,0,.17); }'
    );

    html = html.replace(
      '  #resetBtn {\n    min-width: 76px;\n    padding-left: 10px;\n    padding-right: 10px;\n    white-space: nowrap;\n  }',
      '  #resetBtn {\n    min-width: 76px;\n    padding-left: 10px;\n    padding-right: 10px;\n    white-space: nowrap;\n  }\n  #githubBtn {\n    appearance: none;\n    border: 4px solid var(--ink);\n    background: #fffdf5;\n    color: var(--ink);\n    border-radius: 999px;\n    box-shadow: 5px 5px 0 rgba(0,0,0,.17);\n    cursor: pointer;\n    width: 48px;\n    height: 48px;\n    min-width: 48px;\n    padding: 0;\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    text-decoration: none;\n  }\n  #githubBtn svg {\n    width: 31px;\n    height: 31px;\n    display: block;\n    fill: currentColor;\n  }'
    );

    html = html.replace(
      '    #resetBtn { min-width: 62px; padding-left: 7px; padding-right: 7px; }',
      '    #resetBtn { min-width: 62px; padding-left: 7px; padding-right: 7px; }\n    #githubBtn { width: 44px; height: 44px; min-width: 44px; }\n    #githubBtn svg { width: 29px; height: 29px; }'
    );

    html = html.replace(
      '    #resetBtn { min-width: 56px; padding: 6px 6px; font-size: 12px; border-width: 3px; box-shadow: 3px 3px 0 rgba(0,0,0,.17); }',
      '    #resetBtn { min-width: 56px; padding: 6px 6px; font-size: 12px; border-width: 3px; box-shadow: 3px 3px 0 rgba(0,0,0,.17); }\n    #githubBtn { width: 38px; height: 38px; min-width: 38px; border-width: 3px; box-shadow: 3px 3px 0 rgba(0,0,0,.17); }\n    #githubBtn svg { width: 26px; height: 26px; }'
    );

    html = html.replace(
      '    <button id="resetBtn">Reset</button>',
      '    <button id="resetBtn">Reset</button>\n    <a id="githubBtn" href="' + repoUrl + '" target="_blank" rel="noopener noreferrer" aria-label="Open GitHub repository" title="Open GitHub repository">' + githubSvg + '</a>'
    );

    return html;
  }

  fetch(sourceUrl, { cache: "no-store" })
    .then(function (response) {
      if (!response.ok) throw new Error("Could not load game source: " + response.status);
      return response.text();
    })
    .then(function (html) {
      document.open();
      document.write(patchGameHtml(html));
      document.close();
    })
    .catch(function (error) {
      document.body.innerHTML = '<div class="loading">RocketBoat could not load.<br><small>' + String(error.message || error) + '</small></div>';
      console.error(error);
    });
})();
</script>
</body>
</html>
