    ctx.stroke();

    ctx.lineWidth = W <= 760 ? 2.3 : 3;
    ctx.beginPath();
    ctx.moveTo(-s*0.48, s*0.13);
    ctx.quadraticCurveTo(0, s*0.28, s*0.48, s*0.13);
    ctx.stroke();

    ctx.fillStyle = "rgba(255,255,255,.82)";
    ctx.beginPath();
    ctx.rect(-s*0.18, -s*0.30, s*0.36, s*0.17);
    ctx.fill();
    ctx.stroke();

    // readable Y-shaped slingshot
    const sx = dir * s * 0.34;
    const stemTop = -s*0.42;
    const forkY = -s*0.64;
    const pouchY = -s*0.56;
    ctx.lineWidth = W <= 760 ? 3 : 3.6;
    ctx.beginPath();
    ctx.moveTo(sx, -s*0.06);
    ctx.lineTo(sx, stemTop);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(sx, stemTop);
    ctx.lineTo(sx - dir*s*0.15, forkY);
    ctx.moveTo(sx, stemTop);
    ctx.lineTo(sx + dir*s*0.15, forkY);
    ctx.stroke();

    ctx.lineWidth = W <= 760 ? 2 : 2.5;
    ctx.beginPath();
    ctx.moveTo(sx - dir*s*0.15, forkY);
    ctx.lineTo(sx, pouchY);
    ctx.lineTo(sx + dir*s*0.15, forkY);
    ctx.stroke();
    ctx.fillStyle = accent;
    ctx.beginPath();
    ctx.arc(sx, pouchY, s*0.055, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();

    // small head
    ctx.lineWidth = W <= 760 ? 2 : 2.6;
    ctx.beginPath();
    ctx.arc(-dir*s*0.12, -s*0.39, s*0.05, 0, Math.PI*2);
    ctx.stroke();

    // big steerable rocket booster mounted under the boat's center of mass.
    // Keeping the visible booster centered matches the physics: thrust pushes
    // through the hull instead of visually yanking the boat from the stern.
    const bx = 0;
    const by = s * 0.13;
    // boostAngle is the nozzle / exhaust direction used by the physics.
    // Draw the rocket in a local coordinate system where +X is the exhaust direction.
    // That makes the flame point exactly where the nozzle points. Pulling the pad down
    // makes the exhaust point down, which visually explains why the boat is pushed up.
    const localExhaustAngle = (b.boostAngle || Math.PI / 2) - b.angle;
    const throttle = (b.boostPower || 0) * (0.55 + (b.engineSpool || 0) * 0.95);
    const flameLen = s * (0.24 + throttle * 0.98);
    const flameW = s * (0.16 + Math.min(1.2, throttle) * 0.12);

    // mount arm
    ctx.lineWidth = W <= 760 ? 2 : 2.4;
    ctx.strokeStyle = '#171717';
    ctx.beginPath();
    ctx.moveTo(bx, by - s * 0.14);
    ctx.lineTo(bx, by + s * 0.14);
    ctx.stroke();

    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(localExhaustAngle);

    // Rocket body. In this local space, the pointy nose is toward -X and the
    // nozzle / flame side is toward +X.
    ctx.fillStyle = 'rgba(255,255,255,.98)';
    ctx.lineWidth = W <= 760 ? 2.5 : 3.2;
    ctx.beginPath();
    ctx.moveTo(-s * 0.22, 0);
    ctx.quadraticCurveTo(-s * 0.08, -s * 0.18, s * 0.12, -s * 0.17);
    ctx.lineTo(s * 0.22, -s * 0.10);
    ctx.lineTo(s * 0.22, s * 0.10);
    ctx.lineTo(s * 0.12, s * 0.17);
    ctx.quadraticCurveTo(-s * 0.08, s * 0.18, -s * 0.22, 0);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // accent stripe
    ctx.strokeStyle = b.kind === 'player' ? 'rgba(255,177,61,.95)' : 'rgba(255,104,104,.95)';
    ctx.lineWidth = W <= 760 ? 2.2 : 2.8;
    ctx.beginPath();
    ctx.moveTo(s * 0.01, -s * 0.10);
    ctx.lineTo(-s * 0.08, 0);
    ctx.lineTo(s * 0.01, s * 0.10);
    ctx.stroke();
    ctx.strokeStyle = '#171717';

    // chunky fins near the nozzle end
    ctx.fillStyle = b.kind === 'player' ? 'rgba(255,177,61,.95)' : 'rgba(255,104,104,.94)';
    ctx.beginPath();
    ctx.moveTo(s * 0.02, -s * 0.10);
    ctx.lineTo(s * 0.15, -s * 0.22);
    ctx.lineTo(s * 0.14, -s * 0.05);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(s * 0.02, s * 0.10);
    ctx.lineTo(s * 0.15, s * 0.22);
    ctx.lineTo(s * 0.14, s * 0.05);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // nozzle cup: this is the side the flame comes out of.
    ctx.fillStyle = 'rgba(210,210,210,.96)';
    ctx.beginPath();
    ctx.ellipse(s * 0.22, 0, s * 0.080, s * 0.108, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // exhaust flame, explicitly drawn in the +X/nozzle direction.
    if (throttle > 0.03) {
      ctx.save();
      ctx.globalAlpha = 0.95;
      ctx.fillStyle = b.kind === 'player' ? 'rgba(255,177,61,.97)' : 'rgba(255,104,104,.96)';
      ctx.beginPath();
      ctx.moveTo(s * 0.23, 0);
      ctx.quadraticCurveTo(s * 0.29 + flameLen * 0.24, -flameW, s * 0.23 + flameLen, 0);
      ctx.quadraticCurveTo(s * 0.29 + flameLen * 0.24, flameW, s * 0.23, 0);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,245,200,.96)';
      ctx.beginPath();
      ctx.moveTo(s * 0.20, 0);
      ctx.quadraticCurveTo(s * 0.24 + flameLen * 0.14, -flameW * 0.50, s * 0.20 + flameLen * 0.66, 0);
      ctx.quadraticCurveTo(s * 0.24 + flameLen * 0.14, flameW * 0.50, s * 0.20, 0);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
    ctx.restore();

    ctx.restore();

    if (b.kind !== "player") {
      ctx.save();
      ctx.font = "950 " + (W <= 760 ? "9" : "12") + "px ui-rounded, system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const label = "CPU";
      const labelW = ctx.measureText(label).width + 12;
      const labelH = W <= 760 ? 15 : 20;
      const y = b.y + s*0.72;
      ctx.fillStyle = accent;
      ctx.strokeStyle = "#171717";
      ctx.lineWidth = 3;
      roundRectPath(b.x - labelW/2, y - labelH/2, labelW, labelH, labelH/2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#171717";
      ctx.fillText(label, b.x, y + .5);
      ctx.restore();
    }
  }

  function roundRectPath(x,y,w,h,r) {
    r = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  function drawHotAirBalloons() {
    const now = performance.now();
    for (const balloon of balloons) {
      if (!balloon.active) continue;
      const s = balloon.size;
      const bob = Math.sin(now * 0.0022 + balloon.wobble) * s * 0.045;
      const x = balloon.x;
      const y = balloon.y + bob;

      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#171717';

      // Balloon envelope.
      ctx.fillStyle = 'rgba(255, 177, 61, .96)';
      ctx.lineWidth = W <= 760 ? 3 : 4;
      ctx.beginPath();
      ctx.ellipse(x, y, s * 0.55, s * 0.68, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Vertical panel seams.
      ctx.globalAlpha = 0.65;
      ctx.lineWidth = W <= 760 ? 1.6 : 2.2;
      ctx.beginPath();
      ctx.moveTo(x, y - s * 0.65);
      ctx.quadraticCurveTo(x - s * 0.24, y, x, y + s * 0.64);
      ctx.moveTo(x, y - s * 0.65);
      ctx.quadraticCurveTo(x + s * 0.24, y, x, y + s * 0.64);
      ctx.moveTo(x - s * 0.48, y - s * 0.10);
      ctx.quadraticCurveTo(x, y + s * 0.08, x + s * 0.48, y - s * 0.10);
      ctx.stroke();
      ctx.globalAlpha = 1;

      // Ropes.
      ctx.lineWidth = W <= 760 ? 1.8 : 2.5;
      ctx.beginPath();
      ctx.moveTo(x - s * 0.30, y + s * 0.48);
      ctx.lineTo(x - s * 0.22, y + s * 0.88);
      ctx.moveTo(x + s * 0.30, y + s * 0.48);
      ctx.lineTo(x + s * 0.22, y + s * 0.88);
      ctx.stroke();

      // Basket.
      ctx.fillStyle = 'rgba(126, 92, 48, .96)';
      roundRectPath(x - s * 0.28, y + s * 0.84, s * 0.56, s * 0.30, s * 0.06);
      ctx.fill();
      ctx.stroke();

      // Tiny person.
      ctx.fillStyle = 'rgba(255, 244, 199, .98)';
      ctx.beginPath();
      ctx.arc(x, y + s * 0.78, s * 0.075, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = '#171717';
      ctx.lineWidth = W <= 760 ? 1.5 : 2.0;
      ctx.beginPath();
      ctx.moveTo(x, y + s * 0.86);
      ctx.lineTo(x, y + s * 0.99);
      ctx.moveTo(x - s * 0.10, y + s * 0.91);
      ctx.lineTo(x + s * 0.10, y + s * 0.91);
      ctx.stroke();

      ctx.restore();
    }
  }

  function drawFallingPeople() {
    for (const person of fallingPeople) {
      if (!person.active) continue;
      const s = person.size;
      const floating = person.state === 'float';
      const beingEaten = person.state === 'beingEaten';
      const eatProgress = beingEaten ? clamp(person.eatProgress || 0, 0, 1) : 0;
      const visibleScale = beingEaten ? lerp(1, 0.55, eatProgress) : 1;
      const armSwing = Math.sin(person.flail) * (floating ? 0.16 : (beingEaten ? 0.22 : 0.55));
      const legSwing = Math.cos(person.flail * 1.18) * (floating ? 0.08 : (beingEaten ? 0.10 : 0.42));

      ctx.save();
      ctx.translate(person.x, person.y);
      ctx.rotate(person.angle);
      ctx.scale(visibleScale, visibleScale);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#171717';
      ctx.fillStyle = '#fff4c7';
      ctx.lineWidth = Math.max(2, s * 0.22);

      // Head.
      ctx.beginPath();
      ctx.arc(0, -s * 0.72, s * 0.34, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Body.
      const bodyBottom = floating ? s * 0.36 : (beingEaten ? s * 0.42 : s * 0.48);
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.34);
      ctx.lineTo(0, bodyBottom);
      ctx.stroke();

      // Arms flail while falling, paddle narrowly while floating, and tuck in while eaten.
      ctx.beginPath();
      ctx.moveTo(0, -s * 0.10);
      ctx.lineTo(-s * (beingEaten ? 0.40 : 0.58), s * (0.05 + armSwing * 0.20));
      ctx.moveTo(0, -s * 0.08);
      ctx.lineTo(s * (beingEaten ? 0.40 : 0.58), s * (0.04 - armSwing * 0.20));
      ctx.stroke();

      // Keep the floating legs narrow and bent. The old wide floating stance made
      // his legs suddenly spread out after splashdown, which looked like a glitch.
      const hipY = floating ? s * 0.34 : (beingEaten ? s * 0.32 : s * 0.48);
      const footSpread = floating ? s * 0.20 : (beingEaten ? s * 0.18 : s * 0.42);
      const footY = floating ? s * 0.78 : (beingEaten ? s * 0.62 : s * (1.12 + legSwing * 0.18));
      ctx.beginPath();
      ctx.moveTo(0, hipY);
      ctx.lineTo(-footSpread, footY + legSwing * s * 0.10);
      ctx.moveTo(0, hipY);
      ctx.lineTo(footSpread, footY - legSwing * s * 0.10);
      ctx.stroke();

      ctx.restore();
    }
  }

  function drawBombs() {
    for (const bomb of bombs) {
      if (!bomb.active) continue;
      ctx.save();
      ctx.translate(bomb.x, bomb.y);
      ctx.rotate(bomb.spin || 0);
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.strokeStyle = '#171717';
      ctx.lineWidth = W <= 760 ? 2.4 : 3.0;

      ctx.fillStyle = bomb.wet ? 'rgba(72, 79, 84, .84)' : 'rgba(50, 55, 60, .96)';
      ctx.beginPath();
      ctx.arc(0, 0, bomb.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Fuse nub.
      ctx.beginPath();
      ctx.moveTo(bomb.r * 0.42, -bomb.r * 0.72);
      ctx.quadraticCurveTo(bomb.r * 0.98, -bomb.r * 1.10, bomb.r * 1.22, -bomb.r * 0.56);
      ctx.stroke();
      if (!bomb.wet) {
        ctx.fillStyle = 'rgba(255, 177, 61, .98)';
        ctx.beginPath();
        ctx.arc(bomb.r * 1.22, -bomb.r * 0.56, Math.max(2.2, bomb.r * 0.20), 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }

      ctx.restore();
    }
  }

  function drawMines() {
    const now = performance.now();
    for (const mine of mines) {
      if (!mine.active) continue;
      const r = mine.r;
      const bob = Math.sin(now * 0.0019 + mine.wobble) * 2.2;
      const x = mine.x;
      const y = mine.y + bob;

      ctx.save();
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      // Anchor chain down to the bottom of the screen.
      ctx.strokeStyle = 'rgba(23,23,23,.62)';
      ctx.lineWidth = W <= 760 ? 2.3 : 3.0;
      ctx.beginPath();
      ctx.moveTo(x, y + r * 0.72);
      const links = Math.max(5, Math.floor((H + 8 - y) / 22));
      for (let i = 1; i <= links; i++) {
        const t = i / links;
        const cx = lerp(x, mine.anchorX, t) + Math.sin(t * Math.PI * 5 + mine.wobble) * 2.5;
        const cy = lerp(y + r * 0.72, mine.anchorY, t);
        ctx.lineTo(cx, cy);
      }
      ctx.stroke();

      // Little oval chain links so it reads as chained down, even on mobile.
      ctx.globalAlpha = 0.72;
      ctx.strokeStyle = '#171717';
      ctx.lineWidth = W <= 760 ? 1.6 : 2.0;
      for (let i = 1; i <= links; i++) {
        const t = i / links;
        const cx = lerp(x, mine.anchorX, t) + Math.sin(t * Math.PI * 5 + mine.wobble) * 2.5;
        const cy = lerp(y + r * 0.72, mine.anchorY, t);
        ctx.beginPath();
        ctx.ellipse(cx, cy, 3.2, 5.2, i % 2 ? 0.55 : -0.55, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;

      // Spikes around the mine.
      ctx.strokeStyle = '#171717';
      ctx.fillStyle = 'rgba(60,63,66,.94)';
      ctx.lineWidth = W <= 760 ? 2.4 : 3.2;
      for (let i = 0; i < 10; i++) {
        const a = (i / 10) * Math.PI * 2;
        const sx = x + Math.cos(a) * r * 0.62;
        const sy = y + Math.sin(a) * r * 0.62;
        const tx = x + Math.cos(a) * r * 1.10;
        const ty = y + Math.sin(a) * r * 1.10;
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.lineTo(tx, ty);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(tx, ty, Math.max(2.2, r * 0.12), 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      }

      // Main spiky ball.
      ctx.fillStyle = 'rgba(78,84,88,.94)';
      ctx.beginPath();
      ctx.arc(x, y, r * 0.72, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      // Highlight and warning dot.
      ctx.fillStyle = 'rgba(255,255,255,.52)';
      ctx.beginPath();
      ctx.arc(x - r * 0.22, y - r * 0.24, r * 0.16, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,104,104,.95)';
      ctx.beginPath();
      ctx.arc(x + r * 0.22, y - r * 0.02, r * 0.14, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.restore();
    }
  }

  function drawShark() {
    if (!shark) {
      if (sharkSprite) sharkSprite.style.display = 'none';
      return;
    }

    const s = shark.size;
    const knocked = shark.state !== 'swim';
    const eyeIsX = shark.state === 'spin' || shark.state === 'sink' || shark.state === 'rest';
    const blinkClosed = shark.state === 'blink' && shark.blinkClosed;

    if (!sharkSprite) return;

    // Match the CodePen shark literally by using the same DOM structure and CSS,
    // then scale/rotate/flip the whole sprite to follow the in-game shark motion.
    const u = s * 0.094;
    sharkSprite.style.display = 'block';
    sharkSprite.style.setProperty('--u', u + 'px');
    sharkSprite.style.left = shark.x + 'px';
    sharkSprite.style.top = shark.y + 'px';

    const sx = shark.dir >= 0 ? 1 : -1;
    sharkSprite.style.transform = 'translate(-50%, -50%) scale(' + sx + ',1) rotate(' + (shark.angle || 0) + 'rad)';

    sharkSprite.classList.toggle('knocked', knocked);
    sharkSprite.classList.toggle('eye-x', eyeIsX);
    sharkSprite.classList.toggle('eye-blink', !eyeIsX && blinkClosed);
  }

  function drawShots() {
    for (const sh of shots) {
      ctx.save();
      ctx.fillStyle = "#f5f0df";
      ctx.strokeStyle = "#171717";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(sh.x, sh.y, sh.r, 0, Math.PI*2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawSplashes() {
    for (const sp of splashes) {
      const t = 1 - sp.life / sp.max;
      ctx.save();
      ctx.globalAlpha = 1 - t;
      ctx.strokeStyle = "#171717";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(sp.x, sp.y, 8 + t * sp.power * 5, Math.PI*1.1, Math.PI*1.9);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawHitEffects() {
    for (const fx of hitEffects) {
      const t = 1 - fx.life / fx.max;
      const alpha = 1 - t;
      ctx.save();
      ctx.translate(fx.x, fx.y - t * 12);
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = "#171717";
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      if (fx.kind === "mine" || fx.kind === "bomb" || fx.kind === "balloon") {
        const burst = 18 + t * (W <= 760 ? 54 : 78);
        const plume = 28 + t * (W <= 760 ? 92 : 128);
        ctx.lineWidth = W <= 760 ? 3 : 4;

        // Mostly upward explosion plume.
        ctx.fillStyle = 'rgba(255,177,61,.94)';
        ctx.beginPath();
        ctx.moveTo(0, 6);
        ctx.quadraticCurveTo(-burst * 0.55, -plume * 0.34, -burst * 0.14, -plume);
        ctx.quadraticCurveTo(0, -plume * 0.72, burst * 0.16, -plume * 0.98);
        ctx.quadraticCurveTo(burst * 0.60, -plume * 0.30, 0, 6);
        ctx.closePath();
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = 'rgba(255,245,200,.97)';
        ctx.beginPath();
        ctx.moveTo(0, 2);
        ctx.quadraticCurveTo(-burst * 0.22, -plume * 0.30, 0, -plume * 0.70);
        ctx.quadraticCurveTo(burst * 0.25, -plume * 0.28, 0, 2);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = '#171717';
        ctx.lineWidth = W <= 760 ? 2.4 : 3.2;
        for (let i = 0; i < 10; i++) {
          const a = -Math.PI * 0.95 + i * (Math.PI * 0.90 / 9);
          const inner = 8 + t * 8;
          const outer = burst * (0.58 + (i % 2) * 0.25);
          ctx.beginPath();
          ctx.moveTo(Math.cos(a) * inner, Math.sin(a) * inner);
          ctx.lineTo(Math.cos(a) * outer, Math.sin(a) * outer - t * 16);
          ctx.stroke();
        }

        ctx.font = "950 " + (W <= 760 ? "13" : "18") + "px ui-rounded, system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.strokeStyle = "rgba(238, 231, 208, .98)";
        ctx.lineWidth = W <= 760 ? 5 : 7;
        ctx.strokeText(fx.text || 'BOOM!', 0, -plume * 0.54);
        ctx.fillStyle = '#171717';
        ctx.fillText(fx.text || 'BOOM!', 0, -plume * 0.54);
      } else if (fx.kind === "mountain") {
        // Mountain hits now only show clean readable CLACK text.
        const label = fx.text || "CLACK!";
        const labelSize = W <= 760 ? 13 : 17;
        const textY = -24 - t * 4;

        ctx.font = "950 " + labelSize + "px ui-rounded, system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.strokeStyle = "rgba(238, 231, 208, .98)";
        ctx.lineWidth = W <= 760 ? 5 : 6;
        ctx.strokeText(label, 0, textY + 1);
        ctx.fillStyle = "#171717";
        ctx.fillText(label, 0, textY + 1);
      } else {
        const burst = 12 + t * 18;
        ctx.fillStyle = "rgba(255, 177, 61, .95)";
        ctx.lineWidth = 3;

        // Comic burst lines for boat hits.
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2 + t * 0.4;
          const inner = 5 + t * 2;
          const outer = burst + (i % 2) * 4;
          ctx.beginPath();
          ctx.moveTo(Math.cos(a) * inner, Math.sin(a) * inner);
          ctx.lineTo(Math.cos(a) * outer, Math.sin(a) * outer);
          ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(0, 0, 6 + t * 7, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.font = "950 " + (W <= 760 ? "10" : "14") + "px ui-rounded, system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "bottom";
        ctx.fillStyle = "rgba(255, 104, 104, .98)";
        ctx.strokeStyle = "#171717";
        ctx.lineWidth = 4;
        ctx.strokeText(fx.text, 0, -14 - t * 5);
        ctx.fillText(fx.text, 0, -14 - t * 5);
      }

      ctx.restore();
    }
  }

  function drawAim() {
    if (!pointer.down || gameOver || playerCooldown > 0) return;
    const aim = playerLaunchVector();
    const a = aim.anchor;
    const pull = Math.max(1, aim.pull);
    const cap = W <= 760 ? 190 : 260;
    const scale = Math.min(pull, cap) / pull;
    const px = a.x + aim.dx * scale;
    const py = a.y + aim.dy * scale;

    ctx.save();
    ctx.strokeStyle = "#171717";
    ctx.fillStyle = "rgba(255,177,61,.64)";
    ctx.lineCap = "round";
    ctx.lineWidth = 5;

    // Rubber band still connects to the thumb/pouch position.
    ctx.beginPath();
    ctx.moveTo(a.x - 10, a.y - 4);
    ctx.lineTo(px, py);
    ctx.lineTo(a.x + 10, a.y - 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(px, py, 10, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();

    // Direction arrow uses the deck-tilted launch vector. If waves rotate the boat
    // while the thumb is held still, this arrow rotates too.
    const ux = aim.unitX;
    const uy = aim.unitY;
    const len = clamp(pull * .30, 16, W <= 760 ? 70 : 110);
    const ex = a.x + ux * len;
    const ey = a.y + uy * len;
    const ang = Math.atan2(uy, ux);
    const head = W <= 760 ? 11 : 14;
    ctx.globalAlpha = .9;
    ctx.lineWidth = W <= 760 ? 3 : 4;
    ctx.beginPath();
    ctx.moveTo(a.x + ux*15, a.y + uy*15);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ex, ey);
    ctx.lineTo(ex - Math.cos(ang - .55)*head, ey - Math.sin(ang - .55)*head);
    ctx.lineTo(ex - Math.cos(ang + .55)*head, ey - Math.sin(ang + .55)*head);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }

  function drawBoosterPad() {
    const pad = boosterPadCenter();
    ctx.save();

    // outer ring
    ctx.globalAlpha = 0.82;
    ctx.strokeStyle = '#171717';
    ctx.fillStyle = 'rgba(246,241,230,.46)';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(pad.x, pad.y, pad.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // inner ring
    ctx.globalAlpha = 0.42;
    ctx.beginPath();
    ctx.arc(pad.x, pad.y, pad.r * 0.58, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(pad.x - pad.r * 0.58, pad.y);
    ctx.lineTo(pad.x + pad.r * 0.58, pad.y);
    ctx.moveTo(pad.x, pad.y - pad.r * 0.58);
    ctx.lineTo(pad.x, pad.y + pad.r * 0.58);
    ctx.stroke();

    // directional arrow inside pad
    ctx.globalAlpha = 0.28;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(pad.x, pad.y - pad.r * 0.76);
    ctx.lineTo(pad.x - 7, pad.y - pad.r * 0.58);
    ctx.moveTo(pad.x, pad.y - pad.r * 0.76);
    ctx.lineTo(pad.x + 7, pad.y - pad.r * 0.58);
    ctx.stroke();

    const knobX = pad.x + booster.dx;
    const knobY = pad.y + booster.dy;
    ctx.globalAlpha = 0.76;
    ctx.fillStyle = booster.active || booster.mag > 0.02 ? 'rgba(255,177,61,.68)' : 'rgba(255,255,255,.56)';
    ctx.beginPath();
    ctx.arc(knobX, knobY, pad.r * 0.34, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // tiny flame icon on knob
    ctx.fillStyle = '#171717';
    ctx.beginPath();
    ctx.moveTo(knobX, knobY - pad.r * 0.12);
    ctx.lineTo(knobX - pad.r * 0.08, knobY + pad.r * 0.02);
    ctx.lineTo(knobX, knobY + pad.r * 0.16);
    ctx.lineTo(knobX + pad.r * 0.08, knobY + pad.r * 0.02);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = '#171717';
    ctx.font = '950 ' + (W <= 760 ? '11' : '13') + 'px ui-rounded, system-ui, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('BOOST', pad.x, pad.y - pad.r - 6);
    if (W > 760) {
      ctx.font = '800 11px ui-rounded, system-ui, sans-serif';
      ctx.textBaseline = 'top';
      ctx.fillText('Desktop: WASD or arrows', pad.x, pad.y + pad.r + 8);
    }
    ctx.restore();
  }

  function draw() {
    drawPaper();
    drawWater();
    drawRock();
    drawShark();
    drawHotAirBalloons();
    drawFallingPeople();
    drawMines();
    drawBoat(boats[0]);
    drawBoat(boats[1]);
    drawBombs();
    drawShots();
    drawSplashes();
    drawHitEffects();
    drawAim();
    drawBoosterPad();
  }

  function localPoint(e) {
    const rect = canvas.getBoundingClientRect();
    let t = e;
    if (e.touches && e.touches.length) t = e.touches[0];
    else if (e.changedTouches && e.changedTouches.length) t = e.changedTouches[0];
    return { x: (t.clientX || 0) - rect.left, y: (t.clientY || 0) - rect.top };
  }

  function inputId(e) {
    if (typeof e.pointerId === 'number') return e.pointerId;
    return 'mouse';
  }

  function beginInput(e) {
    if (gameOver) return;
    const p = localPoint(e);
    const id = inputId(e);

    if (!booster.active && insideBoosterPad(p)) {
      booster.active = true;
      booster.id = id;
      setBoosterFromPoint(p);
      lastInput = 'boost-down';
      e.preventDefault && e.preventDefault();
      return false;
    }

    if (!pointer.down) {
      pointer.down = true;
      pointer.id = id;
      pointer.x = pointer.sx = p.x;
      pointer.y = pointer.sy = p.y;
      lastInput = 'sling-down';
      e.preventDefault && e.preventDefault();
      return false;
    }
  }

  function moveInput(e) {
    const p = localPoint(e);
    const id = inputId(e);
    if (booster.active && id === booster.id) {
      setBoosterFromPoint(p);
      lastInput = 'boost-move';
      e.preventDefault && e.preventDefault();
    }
    if (pointer.down && id === pointer.id) {
      pointer.x = p.x;
      pointer.y = p.y;
      lastInput = 'sling-move';
      e.preventDefault && e.preventDefault();
      return false;
    }
  }

  function endInput(e) {
    const id = inputId(e);
    if (booster.active && id === booster.id) {
      clearBooster();
      lastInput = 'boost-up';
      e && e.preventDefault && e.preventDefault();
    }
    if (!pointer.down || id !== pointer.id) return;
    if (e) {
      const p = localPoint(e);
      if (Number.isFinite(p.x) && Number.isFinite(p.y)) {
        pointer.x = p.x;
        pointer.y = p.y;
      }
    }
    lastInput = 'sling-release';
    firePlayer();
    pointer.down = false;
    pointer.id = null;
    e && e.preventDefault && e.preventDefault();
    return false;
  }

  function loop(now) {
    const dt = clamp((now - last) / 1000, 0.001, 0.05);
    last = now;
    try {
      update(dt, now);
      draw();
    } catch (err) {
      console.error(err);
    }
    requestAnimationFrame(loop);
  }

  // Button/UI handlers.
  stageMenuBtn.addEventListener("click", function(e) {
    e.stopPropagation();
    toggleStagePopover();
  });
  stagePopover.addEventListener("click", function(e) {
    const btn = e.target.closest("button[data-stage]");
    if (btn) setStage(Number(btn.dataset.stage));
    e.stopPropagation();
  });
  document.addEventListener("click", function(e) {
    if (!stagePopover.contains(e.target) && !stageMenuBtn.contains(e.target)) {
      closeStagePopover();
    }
  });
  resetBtn.addEventListener("click", function() { closeStagePopover(); reset(true); });
  playAgainBtn.addEventListener("click", function() { reset(true); });

  // Pointer events handle multitouch on mobile, which lets the player aim with one thumb
  // and steer the rocket booster with the left thumb at the same time.
  if (window.PointerEvent) {
    canvas.addEventListener("pointerdown", beginInput, { passive:false });
    window.addEventListener("pointermove", moveInput, { passive:false });
    window.addEventListener("pointerup", endInput, { passive:false });
    window.addEventListener("pointercancel", endInput, { passive:false });
  } else {
    canvas.addEventListener("mousedown", beginInput);
    window.addEventListener("mousemove", moveInput);
    window.addEventListener("mouseup", endInput);
    canvas.addEventListener("touchstart", beginInput, { passive:false });
    window.addEventListener("touchmove", moveInput, { passive:false });
    window.addEventListener("touchend", endInput, { passive:false });
    window.addEventListener("touchcancel", endInput, { passive:false });
  }

  window.addEventListener("keydown", function(e) {
    const k = e.key.toLowerCase();
    if (k === 'w' || k === 'arrowup') keys.up = true;
    else if (k === 's' || k === 'arrowdown') keys.down = true;
    else if (k === 'a' || k === 'arrowleft') keys.left = true;
    else if (k === 'd' || k === 'arrowright') keys.right = true;
    else return;
    e.preventDefault();
  });
  window.addEventListener("keyup", function(e) {
    const k = e.key.toLowerCase();
    if (k === 'w' || k === 'arrowup') keys.up = false;
    else if (k === 's' || k === 'arrowdown') keys.down = false;
    else if (k === 'a' || k === 'arrowleft') keys.left = false;
    else if (k === 'd' || k === 'arrowright') keys.right = false;
  });

  window.addEventListener("blur", function() { pointer.down = false; pointer.id = null; clearBooster(); lastInput = "blur"; keys.up = keys.down = keys.left = keys.right = false; });
  window.addEventListener("resize", resize);
  window.addEventListener("orientationchange", function() { setTimeout(resize, 250); });

  resize();
  last = performance.now();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
