<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>Line Boat Slingshot Battle</title>
<style>
  :root {
    --ink:#171717;
    --paper:#f6f1e6;
    --water:#cceff8;
    --water2:#bfe6f0;
    --orange:#ffb13d;
    --red:#ff6868;
    --green:#67bd6a;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--paper);
    color: var(--ink);
    font-family: ui-rounded, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    touch-action: none;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    background:
      repeating-linear-gradient(45deg, rgba(0,0,0,.045) 0 2px, transparent 2px 28px),
      var(--paper);
  }
  #game {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    touch-action: none;
    z-index: 1;
  }
  #hud {
    position: fixed;
    left: 0;
    right: 0;
    top: 0;
    z-index: 3;
    pointer-events: auto;
    padding: max(8px, env(safe-area-inset-top)) 8px 6px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
  }
  .toolbar {
    position: relative;
    padding: 0;
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 8px;
    align-items: center;
    justify-items: stretch;
  }
  button {
    appearance: none;
    border: 4px solid var(--ink);
    background: #fffdf5;
    color: var(--ink);
    border-radius: 999px;
    padding: 9px 12px;
    font-weight: 950;
    font-size: clamp(14px, 3.8vw, 18px);
    box-shadow: 5px 5px 0 rgba(0,0,0,.17);
    cursor: pointer;
  }
  button.active { background: var(--orange); }
  button:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 rgba(0,0,0,.17); }
  #stageMenuBtn {
    width: 100%;
    min-width: 0;
    justify-self: stretch;
    text-align: center;
    padding-left: 14px;
    padding-right: 14px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .stageMenuName,
  .stageOptionName {
    font-weight: 950;
  }
  #resetBtn {
    min-width: 76px;
    padding-left: 10px;
    padding-right: 10px;
    white-space: nowrap;
  }
  .statusBox {
    padding: 0;
    display: grid;
    gap: 6px;
  }
  .hpRow {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 7px;
    align-items: center;
  }
  .hpName, .hpValue {
    font-weight: 950;
    font-size: clamp(13px, 3.5vw, 17px);
    white-space: nowrap;
  }
  .hpName {
    min-width: 44px;
  }
  .barOuter {
    height: 14px;
    border: 3px solid var(--ink);
    border-radius: 999px;
    overflow: hidden;
    background: white;
  }
  .barInner {
    height: 100%;
    width: 100%;
    background: var(--green);
    transform-origin: left center;
  }
  #enemyHp { background: var(--red); }
  .stagePopover {
    position: fixed;
    z-index: 6;
    display: none;
    left: 8px;
    right: 8px;
    top: calc(max(8px, env(safe-area-inset-top)) + 48px);
    border-radius: 20px;
    padding: 10px;
    border: 4px solid var(--ink);
    background: rgba(246,241,230,.98);
    box-shadow: 7px 7px 0 rgba(0,0,0,.16);
  }
  .stagePopover.show {
    display: block;
  }
  .stagePopoverHeader {
    font-weight: 950;
    font-size: 15px;
    margin: 0 0 8px;
    opacity: .9;
  }
  .stageOption {
    width: 100%;
    margin: 0 0 8px;
    text-align: left;
    border-radius: 18px;
    padding: 10px 12px;
  }
  .stageOption:last-child {
    margin-bottom: 0;
  }
  .stageOption small {
    display: block;
    margin-top: 3px;
    font-size: 11px;
    opacity: .72;
    font-weight: 800;
  }
  .overlay {
    position: fixed;
    left: 0;
    top: 0;
    width: 100vw;
    height: 100vh;
    z-index: 5;
    display: none;
    padding: 0;
    background: rgba(23,23,23,.22);
  }
  .overlay.show { display: block; }
  .modal {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    max-width: 460px;
    width: calc(100vw - 32px);
    background: var(--paper);
    border: 5px solid var(--ink);
    border-radius: 24px;
    box-shadow: 10px 10px 0 rgba(0,0,0,.22);
    padding: 22px;
    text-align: center;
  }
  .modal h2 { margin: 0 0 8px; font-size: 30px; }
  .modal p { margin: 0 0 16px; font-weight: 800; }
  @media (max-width: 760px) {
    #hud {
      padding-left: 8px;
      padding-right: 8px;
      gap: 6px;
    }
    button { padding: 8px 10px; border-width: 4px; }
    #resetBtn { min-width: 62px; padding-left: 7px; padding-right: 7px; }
  }
  @media (max-width: 390px) {
    .toolbar { gap: 6px; }
    #resetBtn { min-width: 56px; padding: 6px 6px; font-size: 12px; border-width: 3px; box-shadow: 3px 3px 0 rgba(0,0,0,.17); }
    .barOuter { height: 13px; }
    .stagePopover {
      top: calc(max(8px, env(safe-area-inset-top)) + 46px);
      padding: 9px;
      border-radius: 18px;
    }
  }

  #sharkSprite {
    --u: 2px;
    position: fixed;
    left: 0;
    top: 0;
    width: calc(30 * var(--u));
    height: calc(10 * var(--u));
    overflow: visible;
    pointer-events: none;
    z-index: 2;
    display: none;
    transform-origin: 50% 50%;
  }
  #sharkSprite div {
    position: absolute;
    box-sizing: border-box;
  }
  #sharkSprite .shark-body {
    left: 0;
    width: calc(30 * var(--u));
    height: calc(20 * var(--u));
    border-radius: 50%;
    transform: translate(0, -50%);
    clip-path: polygon(0% 50%, 100% 50%, 100% 90%, 70% 70%, 90% 100%, 0% 100%);
    background: #aaa;
  }
  #sharkSprite.knocked .shark-body,
  #sharkSprite.knocked .tail,
  #sharkSprite.knocked .fin {
    filter: brightness(0.96);
  }
  #sharkSprite .shark-eye {
    width: calc(1.5 * var(--u));
    height: calc(1.5 * var(--u));
    border-radius: 50%;
    background: white;
    box-shadow: inset calc(-0.2 * var(--u)) calc(-0.45 * var(--u)) 0 calc(0.6 * var(--u));
    top: calc(1.5 * var(--u));
    right: calc(4 * var(--u));
  }
  #sharkSprite.eye-x .shark-eye,
  #sharkSprite.eye-blink .shark-eye {
    background: transparent;
    box-shadow: none;
  }
  #sharkSprite.eye-x .shark-eye::before,
  #sharkSprite.eye-x .shark-eye::after,
  #sharkSprite.eye-blink .shark-eye::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 50%;
    background: #111;
    transform-origin: center center;
  }
  #sharkSprite.eye-x .shark-eye::before,
  #sharkSprite.eye-x .shark-eye::after {
    width: calc(1.8 * var(--u));
    height: calc(0.22 * var(--u));
    border-radius: 999px;
  }
  #sharkSprite.eye-x .shark-eye::before {
    transform: translate(-50%, -50%) rotate(45deg);
  }
  #sharkSprite.eye-x .shark-eye::after {
    transform: translate(-50%, -50%) rotate(-45deg);
  }
  #sharkSprite.eye-blink .shark-eye::before {
    width: calc(1.8 * var(--u));
    height: calc(0.22 * var(--u));
    border-radius: 999px;
    transform: translate(-50%, -50%);
  }
  #sharkSprite .aleta,
  #sharkSprite .tail,
  #sharkSprite .fin {
    width: calc(10 * var(--u));
    height: calc(8 * var(--u));
    box-shadow: calc(4 * var(--u)) calc(-0.5 * var(--u)) #aaa;
    border-radius: 50%;
    top: calc(-1 * var(--u));
    transform: translate(-130%, calc(-3 * var(--u))) rotate(10deg);
  }
  #sharkSprite .aleta {
    box-shadow: calc(5 * var(--u)) 0 #999;
    top: calc(5 * var(--u));
    left: calc(3 * var(--u));
    transform: none;
    clip-path: polygon(0% 50%, 200% 40%, 200% 100%, 0% 100%);
  }
  #sharkSprite .fin {
    box-shadow: calc(5 * var(--u)) 0 #aaa;
    left: calc(15 * var(--u));
  }
  #sharkSprite .gill {
    width: calc(6 * var(--u));
    height: calc(9 * var(--u));
    border-radius: 100%;
    box-shadow: calc(-2 * var(--u)) 0 0 calc(-1.7 * var(--u)) rgba(0,0,0,0.25);
    left: calc(18.5 * var(--u));
  }
  #sharkSprite .gill-2 {
    transform: translate(calc(-1 * var(--u)), 0) scale(0.9);
  }
  #sharkSprite .gill-3 {
    transform: translate(calc(-2 * var(--u)), 0) scale(0.8);
  }

</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="sharkSprite" aria-hidden="true">
  <div class="shark-body"></div>
  <div class="shark-eye"></div>
  <div class="aleta"></div>
  <div class="tail"></div>
  <div class="fin"></div>
  <div class="gill gill-1"></div>
  <div class="gill gill-2"></div>
  <div class="gill gill-3"></div>
</div>


<div id="hud">
  <div class="toolbar">
    <button id="stageMenuBtn" aria-expanded="false">Change stage: <span class="stageMenuName" style="color:#087ca7;">Open Water</span></button>
    <button id="resetBtn">Reset</button>
  </div>
  <div class="statusBox">
    <div class="hpRow">
      <div class="hpName">YOU</div>
      <div class="barOuter"><div class="barInner" id="playerHp"></div></div>
      <div class="hpValue" id="playerHpText">100</div>
    </div>
    <div class="hpRow">
      <div class="hpName">CPU</div>
      <div class="barOuter"><div class="barInner" id="enemyHp"></div></div>
      <div class="hpValue" id="enemyHpText">100</div>
    </div>
  </div>
</div>

<div class="stagePopover" id="stagePopover">
  <div class="stagePopoverHeader">Choose a stage</div>
  <button class="stageOption active" data-stage="0">1 <span class="stageOptionName" style="color:#087ca7;">Open Water</span><small>Just boats, water, and ricochets.</small></button>
  <button class="stageOption" data-stage="1">2 <span class="stageOptionName" style="color:#7a5c20;">Mountain</span><small>Center underwater mountain that sticks above the surface.</small></button>
  <button class="stageOption" data-stage="2">3 <span class="stageOptionName" style="color:#6741d9;">Wave Tank</span><small>Extra rolling water motion for rougher aim.</small></button>
</div>


<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="overlayTitle">You win!</h2>
    <p id="overlayText">The enemy boat sank.</p>
    <button id="playAgainBtn">Play Again</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");
  const sharkSprite = document.getElementById("sharkSprite");
  const hud = document.getElementById("hud");
  const stageButtons = document.querySelectorAll("button[data-stage]");
  const stageMenuBtn = document.getElementById("stageMenuBtn");
  const stagePopover = document.getElementById("stagePopover");
  const resetBtn = document.getElementById("resetBtn");
  const playAgainBtn = document.getElementById("playAgainBtn");
  const overlay = document.getElementById("overlay");
  const overlayTitle = document.getElementById("overlayTitle");
  const overlayText = document.getElementById("overlayText");
  const playerHp = document.getElementById("playerHp");
  const enemyHp = document.getElementById("enemyHp");
  const playerHpText = document.getElementById("playerHpText");
  const enemyHpText = document.getElementById("enemyHpText");

  let W = 0, H = 0, DPR = 1, waterTop = 430, gameBottom = 760;
  let stage = 0;
  let water = [];
  let boats = [];
  let shots = [];
  let splashes = [];
  let hitEffects = [];
  let mines = [];
  let shark = null;
  let balloons = [];
  let bombs = [];
  let fallingPeople = [];
  let balloonTimer = 4.0;
  let pointer = { down:false, id:null, x:0, y:0, sx:0, sy:0 };
  let booster = { active:false, id:null, x:0, y:0, dx:0, dy:0, mag:0 };
  let keys = { up:false, down:false, left:false, right:false };
  let playerCooldown = 0;
  let enemyTimer = 1.1;
  let last = performance.now();
  let running = true;
  let frames = 0;
  let gameOver = false;
  let lastInput = "none";
  let lastShotTime = 0;

  const STAGE_NAMES = ["Open Water", "Mountain", "Wave Tank"];
  const STAGE_COLORS = ["#087ca7", "#7a5c20", "#6741d9"];

  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }
  function rand(a, b) { return a + Math.random() * (b - a); }
  function rotateVec(x, y, angle) {
    const c = Math.cos(angle);
    const s = Math.sin(angle);
    return { x: x * c - y * s, y: x * s + y * c };
  }
  function playerLaunchVector() {
    const b = boats[0];
    const a = slingshotAnchor(b);

    // Mobile-friendly aiming: the shot is based ONLY on the drag vector from
    // where the finger first touched the screen to where it is now. It does not
    // use the finger's position, angle, or distance relative to the boat. That
    // means you can start dragging almost anywhere on the screen, pull down-left,
    // and shoot up-right even when the boat is pinned against the left edge.
    const dx = pointer.x - pointer.sx;
    const dy = pointer.y - pointer.sy;
    const pull = Math.hypot(dx, dy);
    const launchX = -dx;
    const launchY = -dy;
    const lp = Math.max(1, Math.hypot(launchX, launchY));

    return { anchor: a, dx, dy, pull, x: launchX, y: launchY, unitX: launchX / lp, unitY: launchY / lp };
  }

  function boosterPadCenter() {
    return { x: W - (W <= 760 ? 76 : 92), y: H - (W <= 760 ? 86 : 96), r: W <= 760 ? 46 : 56 };
  }

  function insideBoosterPad(p) {
    const pad = boosterPadCenter();
    return Math.hypot(p.x - pad.x, p.y - pad.y) <= pad.r * 1.2;
  }

  function setBoosterFromPoint(p) {
    const pad = boosterPadCenter();
    const dx = p.x - pad.x;
    const dy = p.y - pad.y;
    const len = Math.hypot(dx, dy) || 1;
    const maxR = pad.r * 0.9;
    const clamped = Math.min(len, maxR);
    booster.x = p.x;
    booster.y = p.y;
    booster.dx = dx / len * clamped;
    booster.dy = dy / len * clamped;
    booster.mag = clamped / maxR;
  }

  function clearBooster() {
    booster.active = false;
    booster.id = null;
    booster.dx = 0;
    booster.dy = 0;
    booster.mag = 0;
  }

  function getPlayerBoostControl() {
    let x = 0;
    let y = 0;
    let power = 0;
    if (booster.active) {
      const len = Math.hypot(booster.dx, booster.dy) || 1;
      x = booster.dx / len;
      y = booster.dy / len;
      power = booster.mag;
    } else {
      // Keyboard direction points the booster nozzle. Pulling/pressing down points the nozzle down,
      // which means the boat is thrust upward when the rocket force is applied.
      x = (keys.right ? 1 : 0) - (keys.left ? 1 : 0);
      y = (keys.down ? 1 : 0) - (keys.up ? 1 : 0);
      const len = Math.hypot(x, y);
      if (len > 0) {
        x /= len;
        y /= len;
        power = 1;
      }
    }
    return { x, y, power };
  }

  function getEnemyBoostControl(now) {
    const e = boats[1];
    const s = boatSize();
    const preferredAlt = waterY(e.x) - s * 2.0 - 18;
    const desiredX = W * 0.76 + Math.sin(now * 0.0011) * W * 0.045;
    const desiredY = preferredAlt + Math.sin(now * 0.0018) * 14;
    let x = clamp((desiredX - e.x) / 80, -1, 1);
    let y = clamp((desiredY - e.y) / 60, -1, 1);

    // Nudge away from incoming player shots so the booster feels alive.
    let nearest = null;
    let nearestDist = 1e9;
    for (const sh of shots) {
      if (sh.owner !== 'player' || sh.wet) continue;
      const dx = sh.x - e.x;
      const dy = sh.y - e.y;
      const d = Math.hypot(dx, dy);
      if (d < nearestDist) {
        nearestDist = d;
        nearest = sh;
      }
    }
    if (nearest && nearestDist < 190) {
      x += clamp((e.x - nearest.x) / 85, -1.0, 1.0);
      y += clamp((e.y - nearest.y) / 85, -1.0, 1.0);
    }

    // Keep the enemy from scraping the bottom edge too much.
    if (e.y > H - 150) y -= 0.9;

    const len = Math.hypot(x, y);
    if (len < 0.05) return { x:0, y:0, power:0 };
    // x/y above represent desired boat motion. Return the opposite vector because the booster nozzle
    // points opposite the direction of travel.
    return { x:-x/len, y:-y/len, power:clamp(len, 0.35, 1.0) };
  }

  function resize() {
    DPR = clamp(window.devicePixelRatio || 1, 1, 2);
    W = Math.max(320, window.innerWidth || document.documentElement.clientWidth || 393);
    H = Math.max(560, window.innerHeight || document.documentElement.clientHeight || 852);
    canvas.width = Math.round(W * DPR);
    canvas.height = Math.round(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    const hudBottom = hud.getBoundingClientRect().bottom || 260;
    // Lower the water so it occupies only about the bottom third of the screen.
    // Keep it safely below the HUD, but prefer a much lower waterline overall.
    const targetWaterTop = W <= 760 ? H * 0.67 : H * 0.66;
    waterTop = Math.max(hudBottom + 18, targetWaterTop);
    waterTop = Math.min(waterTop, H - 150);
    gameBottom = H - (W <= 760 ? 108 : 96);
    initWater();
    reset(false);
  }

  function boatSize() {
    return clamp(W * (W <= 760 ? 0.026 : 0.030), W <= 760 ? 16 : 24, W <= 760 ? 24 : 42);
  }

  function initWater() {
    const n = clamp(Math.round(W / 4), 110, 260);
    water = [];
    for (let i = 0; i < n; i++) water.push({ y:0, v:0, base:0 });
  }

  function initMines() {
    mines = [];
    if (!W || !H) return;
    const count = W <= 760 ? 4 : 6;
    const bottomPad = W <= 760 ? 72 : 86;
    const safeLeft = W <= 760 ? 54 : 84;
    const safeRight = W <= 760 ? 54 : 86;
    const topY = waterTop + (W <= 760 ? 54 : 70);
    const bottomY = Math.max(topY + 40, H - bottomPad - 58);
    const r = clamp(W * 0.030, W <= 760 ? 15 : 19, W <= 760 ? 22 : 30);

    // Spread mines across valid horizontal lanes. On the mountain stage, remove
    // the full mountain footprint plus extra clearance so the mine body and the
    // chain do not visually overlap the underwater mountain.
    const lanes = [];
    if (stage === 1) {
      const m = mountainShape();
      const mountainVisualLeft = m.left - W * 0.11;
      const mountainVisualRight = m.right + W * 0.12;
      const clearance = r * 2.75;
      lanes.push({ min:safeLeft + r, max:mountainVisualLeft - clearance });
      lanes.push({ min:mountainVisualRight + clearance, max:W - safeRight - r });
    } else {
      lanes.push({ min:safeLeft + r, max:W - safeRight - r });
    }

    const usableLanes = lanes.filter(lane => lane.max - lane.min >= r * 1.6);
    const fallbackLane = { min:safeLeft + r, max:W - safeRight - r };
    const totalLaneWidth = usableLanes.reduce((sum, lane) => sum + Math.max(1, lane.max - lane.min), 0);

    for (let i = 0; i < count; i++) {
      let x;
      if (usableLanes.length) {
        const globalT = (i + 0.5) / count * totalLaneWidth;
        let cursor = 0;
        let chosen = usableLanes[usableLanes.length - 1];
        for (const lane of usableLanes) {
          const w = Math.max(1, lane.max - lane.min);
          if (globalT <= cursor + w) {
            chosen = lane;
            break;
          }
          cursor += w;
        }
        const laneW = Math.max(1, chosen.max - chosen.min);
        const laneOffset = clamp((globalT - cursor) / laneW, 0.10, 0.90);
        const wobble = Math.sin(i * 2.31 + W * 0.011) * Math.min(laneW * 0.08, r * 0.55);
        x = clamp(chosen.min + laneW * laneOffset + wobble, chosen.min, chosen.max);
      } else {
        const t = count === 1 ? 0.5 : i / (count - 1);
        x = lerp(fallbackLane.min, fallbackLane.max, t);
      }

      const depthT = (i % 4) / 3;
      const y = lerp(topY, bottomY, 0.18 + depthT * 0.68);
      mines.push({ x, y, r, anchorX:x + Math.sin(i * 1.7) * r * 0.45, anchorY:H + 10, active:true, wobble:rand(0, Math.PI * 2), pulse:0 });
    }
  }

  function explodeMine(mine, cause) {
    if (!mine || !mine.active) return;
    mine.active = false;

    const blastRadius = clamp(W * 0.30, W <= 760 ? 118 : 150, W <= 760 ? 170 : 230);
    const wavePower = W <= 760 ? 34 : 44;
    disturbWater(mine.x, wavePower, blastRadius * 0.62);
    disturbWater(mine.x - blastRadius * 0.18, wavePower * 0.42, blastRadius * 0.42);
    disturbWater(mine.x + blastRadius * 0.18, wavePower * 0.42, blastRadius * 0.42);

    splashes.push({ x:mine.x, y:waterY(mine.x), life:0.90, max:0.90, power:wavePower * 0.72 });
    hitEffects.push({ kind:'mine', x:mine.x, y:mine.y, life:0.72, max:0.72, text:'BOOM!' });

    for (const b of boats) {
      const dx = b.x - mine.x;
      const dy = b.y - mine.y;
      const dist = Math.max(1, Math.hypot(dx, dy));
      const falloff = clamp(1 - dist / blastRadius, 0, 1);
      const directlyAbove = Math.abs(dx) < blastRadius * 0.34 && b.y < mine.y;
      const nearAbove = Math.abs(dx) < blastRadius * 0.52 && b.y < mine.y + blastRadius * 0.18;

      if (falloff > 0 || directlyAbove) {
        const lift = (directlyAbove ? 5.8 : 3.9) * Math.max(falloff, directlyAbove ? 0.72 : 0);
        const sideKick = clamp(dx / blastRadius, -1, 1) * 1.35 * Math.max(falloff, 0.35);
        b.vy -= lift;
        b.vx += sideKick;
        b.av += sideKick * 0.09;

        if (nearAbove || falloff > 0.20) {
          const damage = clamp((directlyAbove ? 8 : 4) + falloff * 9, 3, 16);
          b.hp = clamp(b.hp - damage, 0, 100);
        }
      }
    }

    if (cause) cause.life = -1;
    updateHud();
    checkGameOver();
  }

  function bombHitsMountain(bomb) {
    if (stage !== 1) return false;
    const m = mountainShape();
    if (bomb.x + bomb.r < m.left || bomb.x - bomb.r > m.right) return false;
    const surfaceY = mountainSurfaceY(bomb.x);
    return bomb.y + bomb.r >= surfaceY && bomb.y - bomb.r <= m.bottom;
  }

  function explodeBomb(bomb, cause, label) {
    if (!bomb || !bomb.active) return;
    bomb.active = false;

    const blastRadius = clamp(W * 0.22, W <= 760 ? 86 : 120, W <= 760 ? 138 : 180);
    const surf = waterY(bomb.x);
    const underwater = bomb.y > surf - bomb.r;
    const wavePower = underwater ? (W <= 760 ? 22 : 30) : (W <= 760 ? 13 : 18);

    if (underwater) {
      disturbWater(bomb.x, wavePower, blastRadius * 0.62);
      splashes.push({ x:bomb.x, y:surf, life:0.70, max:0.70, power:wavePower * 0.75 });
    } else if (bomb.y < surf + 40) {
      disturbWater(bomb.x, wavePower * 0.55, blastRadius * 0.44);
    }

    hitEffects.push({
      kind:'bomb',
      x:bomb.x,
      y:bomb.y,
      life:0.62,
      max:0.62,
      text:label || 'BOOM!'
    });

    for (const b of boats) {
      const s = boatSize();
      const hitX = b.x;
      const hitY = b.y - s * 0.12;
      const dx = hitX - bomb.x;
      const dy = hitY - bomb.y;
      const dist = Math.max(1, Math.hypot(dx, dy));
      const falloff = clamp(1 - dist / blastRadius, 0, 1);
      if (falloff > 0) {
        const damage = clamp(5 + falloff * 12, 4, 16);
        b.hp = clamp(b.hp - damage, 0, 100);
        b.vx += dx / dist * (0.55 + falloff * 1.35);
        b.vy += dy / dist * (0.30 + falloff * 0.90) - falloff * 1.00;
        b.av += clamp(dx / blastRadius, -1, 1) * 0.12;
      }
    }

    if (cause) cause.life = -1;
    updateHud();
    checkGameOver();
  }

  function balloonVisualPosition(balloon, now) {
    const s = balloon.size;
    const bob = Math.sin((now || performance.now()) * 0.0022 + balloon.wobble) * s * 0.045;
    return { x:balloon.x, y:balloon.y + bob };
  }

  function boatCollisionPoints(boat) {
    const s = boatSize();
    const pts = [];
    const samples = [
      { x:-s * 0.72, y:-s * 0.08, r:s * 0.18 },
      { x:-s * 0.36, y:s * 0.16, r:s * 0.22 },
      { x:0, y:s * 0.18, r:s * 0.25 },
      { x:s * 0.36, y:s * 0.16, r:s * 0.22 },
      { x:s * 0.72, y:-s * 0.08, r:s * 0.18 },
      { x:0, y:-s * 0.30, r:s * 0.20 }
    ];

    for (const p of samples) {
      const rp = rotateVec(p.x, p.y, boat.angle);
      pts.push({ x:boat.x + rp.x, y:boat.y + rp.y, r:p.r });
    }
    return pts;
  }

  function boatHitsBalloon(boat, balloon, now) {
    if (!boat || !balloon || !balloon.active) return false;
    const s = balloon.size;
    const pos = balloonVisualPosition(balloon, now);
    const bodyX = pos.x;
    const bodyY = pos.y;
    const basketX = pos.x;
    const basketY = pos.y + s * 0.99;

    for (const pt of boatCollisionPoints(boat)) {
      const bodyDx = (pt.x - bodyX) / Math.max(1, s * 0.56 + pt.r * 0.45);
      const bodyDy = (pt.y - bodyY) / Math.max(1, s * 0.70 + pt.r * 0.45);
      if (bodyDx * bodyDx + bodyDy * bodyDy <= 1) return true;

      const basketHit =
        Math.abs(pt.x - basketX) <= s * 0.34 + pt.r &&
        Math.abs(pt.y - basketY) <= s * 0.24 + pt.r;
      if (basketHit) return true;

      const ropeHit =
        pt.y >= bodyY + s * 0.42 - pt.r &&
        pt.y <= basketY + s * 0.16 + pt.r &&
        Math.abs(pt.x - bodyX) <= s * 0.34 + pt.r * 0.60;
      if (ropeHit) return true;
    }
    return false;
  }

  function applyBalloonExplosionForce(balloon, boomX, boomY, boatHit, seen) {
    // Hot air balloon explosions are meant to feel like a big pressure blast, not
    // a tiny pop. The radius is broad, and the impulse is intentionally much
    // stronger on light airborne rocks than on heavy boats.
    const blastRadius = clamp(W * 0.46, W <= 760 ? 168 : 220, W <= 760 ? 260 : 360);
    const pushScale = W <= 760 ? 1.45 : 1.70;

    for (const b of boats) {
      const s = boatSize();
      const hitX = b.x;
      const hitY = b.y - s * 0.12;
      let dx = hitX - boomX;
      let dy = hitY - boomY;
      let dist = Math.hypot(dx, dy);
      if (dist < 1) {
        dx = b.vx || (b.kind === 'player' ? -1 : 1);
        dy = b.vy || -0.35;
        dist = Math.max(1, Math.hypot(dx, dy));
      }
      const falloff = clamp(1 - dist / blastRadius, 0, 1);
      if (falloff <= 0 && b !== boatHit) continue;

      const forcedFalloff = b === boatHit ? Math.max(falloff, 0.92) : falloff;
      const nx = dx / dist;
      const ny = dy / dist;
      const outward = Math.pow(forcedFalloff, 0.48);
      const closeKick = Math.pow(forcedFalloff, 1.60);
      const crashBoost = b === boatHit ? 1.65 : 1.0;

      // Boats are heavy, but a close balloon blast should visibly throw them a
      // meaningful distance. Add a little upward kick so sky collisions feel
      // explosive instead of just sliding sideways.
      b.vx += nx * (2.45 + outward * 6.70 + closeKick * 3.25) * pushScale * crashBoost;
      b.vy += ny * (1.70 + outward * 4.65 + closeKick * 2.35) * pushScale * crashBoost;
      b.vy -= (0.95 + closeKick * 1.15) * crashBoost;
      b.av += clamp(nx, -1, 1) * (0.24 + outward * 0.56 + closeKick * 0.28) * crashBoost;

      if (b === boatHit) {
        const balloonCrashDamage = 8;
        b.hp = clamp(b.hp - balloonCrashDamage, 0, 100);
      }
    }

    for (const sh of shots) {
      if (!sh || sh.life <= 0 || sh.wet) continue;
      const dx = sh.x - boomX;
      const dy = sh.y - boomY;
      const dist = Math.max(1, Math.hypot(dx, dy));
      const falloff = clamp(1 - dist / blastRadius, 0, 1);
      if (falloff <= 0) continue;
      const nx = dx / dist;
      const ny = dy / dist;
      const impulse = Math.pow(falloff, 0.38);
      const closeKick = Math.pow(falloff, 1.45);

      // Rocks are tiny and light, so a nearby balloon blast should turn them
      // into fast shrapnel. Cap the total speed so the game stays playable and
      // collision checks do not tunnel straight through targets.
      sh.vx += nx * (5.4 + impulse * 14.8 + closeKick * 7.5);
      sh.vy += ny * (4.4 + impulse * 11.2 + closeKick * 5.7) - impulse * 1.25;
      const rockSpeed = Math.hypot(sh.vx, sh.vy);
      const maxRockSpeed = W <= 760 ? 30 : 38;
      if (rockSpeed > maxRockSpeed) {
        sh.vx = sh.vx / rockSpeed * maxRockSpeed;
        sh.vy = sh.vy / rockSpeed * maxRockSpeed;
      }
      sh.mountainCd = Math.max(sh.mountainCd || 0, 0.08);
    }

    for (const bomb of bombs) {
      if (!bomb || !bomb.active) continue;
      const dx = bomb.x - boomX;
      const dy = bomb.y - boomY;
      const dist = Math.max(1, Math.hypot(dx, dy));
      const falloff = clamp(1 - dist / blastRadius, 0, 1);
      if (falloff <= 0) continue;
      if (falloff > 0.82) {
        explodeBomb(bomb, null, 'BOOM!');
        continue;
      }
      const nx = dx / dist;
      const ny = dy / dist;
      const impulse = Math.pow(falloff, 0.48);
      const closeKick = Math.pow(falloff, 1.50);
      bomb.vx += nx * (2.3 + impulse * 6.0 + closeKick * 2.6);
      bomb.vy += ny * (1.8 + impulse * 4.6 + closeKick * 2.0) - impulse * 0.80;
      if (bomb.wet) {
        bomb.wet = false;
        bomb.fuse = Math.max(bomb.fuse || 0, 0.35);
      }
    }

    if (!seen) seen = new Set();
    for (const other of balloons) {
      if (!other || other === balloon || !other.active || seen.has(other)) continue;
      const pos = balloonVisualPosition(other);
      const dx = pos.x - boomX;
      const dy = pos.y - boomY;
      const dist = Math.max(1, Math.hypot(dx, dy));
      const falloff = clamp(1 - dist / (blastRadius * 0.84), 0, 1);
      if (falloff > 0.26) {
        explodeBalloon(other, null, null, seen);
      } else if (falloff > 0) {
        other.vx += dx / dist * falloff * 1.35;
        other.y += dy / dist * falloff * 18;
      }
    }

    disturbWater(boomX, W <= 760 ? 5.5 : 7.5, blastRadius * 0.30);
    updateHud();
    checkGameOver();
  }

  function explodeBalloon(balloon, cause, boatHit, seen) {
    if (!balloon || !balloon.active) return;
    if (!seen) seen = new Set();
    seen.add(balloon);

    balloon.active = false;
    const pos = balloonVisualPosition(balloon);
    const boomX = pos.x;
    const boomY = pos.y + balloon.size * 0.24;

    spawnFallingPersonFromBalloon(balloon, boomX, boomY);

    hitEffects.push({ kind:'balloon', x:boomX, y:boomY, life:0.82, max:0.82, text:'POP!' });
    splashes.push({ x:boomX, y:boomY, life:0.36, max:0.36, power:balloon.size * 0.18 });

    applyBalloonExplosionForce(balloon, boomX, boomY, boatHit || null, seen);

    if (cause) cause.life = -1;
  }

  function spawnBalloon() {
    if (!W || !H || gameOver) return;
    const dir = Math.random() < 0.5 ? 1 : -1;
    const size = clamp(W * 0.070, W <= 760 ? 32 : 42, W <= 760 ? 50 : 68);
    const topSafe = Math.max((hud.getBoundingClientRect().bottom || 76) + size * 0.70, 88);
    const bottomSafe = Math.max(topSafe + 8, waterTop - size * 2.15);
    const y = clamp(rand(topSafe, bottomSafe), topSafe, Math.max(topSafe, bottomSafe));
    const x = dir > 0 ? -size * 1.7 : W + size * 1.7;
    const speed = dir * rand(W <= 760 ? 0.42 : 0.50, W <= 760 ? 0.72 : 0.88);
    balloons.push({
      x, y, vx:speed, size, dir, active:true,
      dropTimer:rand(0.75, 1.45), dropsLeft:Math.floor(rand(3, 6)), wobble:rand(0, Math.PI * 2), life:36
    });
  }

  function spawnBombFromBalloon(balloon) {
    const r = clamp(W * 0.014, W <= 760 ? 7 : 9, W <= 760 ? 11 : 15);
    bombs.push({
      x:balloon.x,
      y:balloon.y + balloon.size * 1.18,
      vx:balloon.vx * 0.34 + rand(-0.18, 0.18),
      vy:0.34,
      r,
      active:true,
      wet:false,
      sinkTimer:0,
      fuse:0,
      spin:rand(0, Math.PI * 2),
      av:rand(-0.08, 0.08),
      life:12
    });
  }

  function spawnFallingPersonFromBalloon(balloon, boomX, boomY) {
    if (!balloon) return;
    const pos = balloonVisualPosition(balloon);
    const s = balloon.size;
    const personSize = clamp(s * 0.25, W <= 760 ? 8 : 10, W <= 760 ? 12 : 16);
    const startX = pos.x;
    const startY = pos.y + s * 0.96;
    const away = startX >= boomX ? 1 : -1;
    fallingPeople.push({
      x:startX,
      y:startY,
      vx:balloon.vx * 0.55 + away * rand(0.28, 0.72) + rand(-0.20, 0.20),
      vy:rand(-0.65, -0.18),
      size:personSize,
      angle:rand(-0.40, 0.40),
      av:rand(-0.18, 0.18),
      flail:rand(0, Math.PI * 2),
      active:true,
      state:'fall',
      hitWater:false,
      floatBob:rand(0, Math.PI * 2),
      floatWaveTimer:0,
      life:28
    });
  }

  function updateFallingPeople(dt, now) {
    const gravity = 0.155;
    for (const person of fallingPeople) {
      if (!person.active) continue;
      person.life -= dt;

      if (person.state === 'fall') {
        person.flail += dt * 12;
        person.vy += gravity * dt * 60;
        person.vx *= Math.pow(0.996, dt * 60);
        person.angle += person.av * dt * 60;
        person.x += person.vx * dt * 60;
        person.y += person.vy * dt * 60;

        const surface = waterY(person.x);
        if (!person.hitWater && person.y + person.size * 1.55 >= surface) {
          person.hitWater = true;
          person.state = 'float';
          person.y = surface - person.size * 0.24;
          person.vx *= 0.36;
          person.vy = 0;
          person.angle = clamp(person.angle, -0.45, 0.45);
          person.floatWaveTimer = 0.35;

          // A person hitting the water should make a noticeable little wake, not vanish.
          disturbWater(person.x, W <= 760 ? 18 : 23, W <= 760 ? 46 : 58);
          disturbWater(person.x - person.size * 1.35, W <= 760 ? 7 : 9, W <= 760 ? 26 : 34);
          disturbWater(person.x + person.size * 1.35, W <= 760 ? 7 : 9, W <= 760 ? 26 : 34);
          splashes.push({ x:person.x, y:surface, life:0.72, max:0.72, power:person.size * 1.85 });
        }
      } else if (person.state === 'float') {
        person.flail += dt * 3.2;
        person.floatBob += dt * 3.2;
        person.floatWaveTimer -= dt;
        person.vx *= Math.pow(0.975, dt * 60);
        person.x += person.vx * dt * 60;

        const surface = waterY(person.x);
        person.y += ((surface - person.size * 0.24 + Math.sin(person.floatBob) * person.size * 0.10) - person.y) * 0.16 * dt * 60;
        person.angle += ((Math.sin(person.floatBob * 0.72) * 0.16) - person.angle) * 0.10 * dt * 60;

        // Keep a subtle ripple around him while he floats.
        if (person.floatWaveTimer <= 0) {
          disturbWater(person.x, W <= 760 ? 2.2 : 3.0, W <= 760 ? 20 : 26);
          person.floatWaveTimer = 0.55;
        }
      } else if (person.state === 'beingEaten') {
        person.flail += dt * 7.0;
        person.life = Math.max(person.life || 0, 3);
      }

      if (person.x < -80 || person.x > W + 80 || person.y > H + 100 || person.life <= 0) {
        person.active = false;
      }
    }
    fallingPeople = fallingPeople.filter(p => p.active);
  }

  function updateBalloons(dt, now) {
    balloonTimer -= dt;
    if (balloonTimer <= 0 && balloons.length < 1) {
      spawnBalloon();
      balloonTimer = rand(14, 24);
    }

    for (const balloon of balloons) {
      if (!balloon.active) continue;
      balloon.life -= dt;
      balloon.x += balloon.vx * dt * 60;
      balloon.y += Math.sin(now * 0.0018 + balloon.wobble) * 0.018 * dt * 60;
      balloon.dropTimer -= dt;
      if (balloon.dropsLeft > 0 && balloon.dropTimer <= 0 && balloon.x > balloon.size * 0.8 && balloon.x < W - balloon.size * 0.8) {
        spawnBombFromBalloon(balloon);
        balloon.dropsLeft--;
        balloon.dropTimer = rand(0.70, 1.25);
      }

      for (const boat of boats) {
        if (!balloon.active) break;
        if (boatHitsBalloon(boat, balloon, now)) {
          explodeBalloon(balloon, null, boat);
          break;
        }
      }

      if (balloon.x < -balloon.size * 2.5 || balloon.x > W + balloon.size * 2.5 || balloon.life <= 0) balloon.active = false;
    }
    balloons = balloons.filter(b => b.active);
  }

  function updateBombs(dt) {
    const gravity = 0.20;
    for (const bomb of bombs) {
      if (!bomb.active) continue;
      bomb.life -= dt;
      bomb.spin += bomb.av * dt * 60;

      if (!bomb.wet) {
        bomb.vy += gravity * dt * 60;
        bomb.vx *= Math.pow(0.998, dt * 60);
        bomb.vy *= Math.pow(0.999, dt * 60);
      } else {
        bomb.sinkTimer += dt;
        bomb.fuse -= dt;
        bomb.vx *= Math.pow(0.92, dt * 60);
        bomb.vy += (0.22 - bomb.vy) * 0.10 * dt * 60;
        bomb.vy = clamp(bomb.vy, -0.08, 0.34);
      }

      bomb.x += bomb.vx * dt * 60;
      bomb.y += bomb.vy * dt * 60;

      const surf = waterY(bomb.x);
      if (!bomb.wet && bomb.y + bomb.r >= surf) {
        bomb.wet = true;
        bomb.sinkTimer = 0;
        bomb.fuse = rand(0.92, 1.25);
        bomb.y = surf + bomb.r * 0.35;
        bomb.vx *= 0.28;
        bomb.vy = 0.16;
        disturbWater(bomb.x, 8.5, 26);
        splashes.push({ x:bomb.x, y:surf, life:0.46, max:0.46, power:8.0 });
      }

      if (bomb.wet && bomb.fuse <= 0) {
        explodeBomb(bomb, null, 'BOOM!');
        continue;
      }

      if (bombHitsMountain(bomb)) {
        explodeBomb(bomb, null, 'BOOM!');
        continue;
      }

      for (const b of boats) {
        const s = boatSize();
        const hitX = b.x;
        const hitY = b.y - s * 0.12;
        if (Math.hypot(bomb.x - hitX, bomb.y - hitY) <= s * 0.62 + bomb.r) {
          explodeBomb(bomb, null, 'BOOM!');
          break;
        }
      }

      if (bomb.x < -80 || bomb.x > W + 80 || bomb.y > H + 180 || bomb.life <= 0) bomb.active = false;
    }
    bombs = bombs.filter(b => b.active);
  }

  function initShark() {
    // Keep the shark clearly visible, but still fairly small. The latest user
    // request was to make him about double the current size.
    const size = clamp(W * 0.032, W <= 760 ? 16 : 22, W <= 760 ? 26 : 36);
    const dir = Math.random() < 0.5 ? 1 : -1;
    const x = dir > 0 ? W * 0.22 : W * 0.78;
    const depth = sharkPreferredDepth(x, size);
    const y = sharkSwimTargetY(x, size, depth, 0);
    shark = {
      x,
      y,
      vx:dir * rand(0.30, 0.44),
      vy:0,
      dir,
      size,
      angle:0,
      state:'swim',
      wobble:rand(0, Math.PI * 2),
      depth,
      spinTimer:0,
      restTimer:0,
      blinkTimer:0,
      blinkCount:0,
      blinkClosed:false,
      recoverTimer:0
    };
  }

  function sharkPreferredDepth(x, size) {
    const surface = waterY(x);
    const bottom = H - Math.max(W <= 760 ? 52 : 66, size * 1.10);
    const swimHeight = Math.max(size * 3.2, bottom - surface);
    return clamp(swimHeight * rand(0.58, 0.76), size * 2.00, Math.max(size * 2.05, swimHeight - size * 0.85));
  }

  function sharkSwimTargetY(x, size, depth, wobble) {
    const surface = waterY(x);
    const bottom = H - Math.max(W <= 760 ? 52 : 66, size * 1.10);
    const lowerHalfTop = surface + Math.max(size * 1.80, (bottom - surface) * 0.50);
    return clamp(surface + depth + wobble, lowerHalfTop, bottom);
  }

  function sharkBottomY() {
    if (!shark) return H - 4;
    return H - Math.max(4, shark.size * 0.12);
  }

  function keepSharkOutOfBoostControl() {
    if (!shark) return;
    const pad = boosterPadCenter();
    const keepOut = pad.r + shark.size * 1.55;
    const labelPad = W <= 760 ? 20 : 24;
    const dy = shark.y - pad.y;
    const inVerticalRange = shark.y > pad.y - pad.r - shark.size - labelPad && shark.y < pad.y + pad.r + shark.size;
    if (!inVerticalRange) return;

    const dx = shark.x - pad.x;
    const dist = Math.hypot(dx, dy);
    const inLabelArea = shark.x > pad.x - keepOut && shark.y < pad.y - pad.r && shark.y > pad.y - pad.r - shark.size - labelPad;
    if (dist >= keepOut && !inLabelArea) return;

    const verticalRoom = Math.max(0, keepOut * keepOut - dy * dy);
    const safeX = pad.x - Math.sqrt(verticalRoom) - shark.size * 0.18;
    shark.x = clamp(Math.min(shark.x, safeX), shark.size * 1.3, W - shark.size * 1.3);
    if (shark.vx > 0) shark.vx = -Math.abs(shark.vx);
    shark.dir = -1;
  }

  function sharkCollisionRadius() {
    return shark ? shark.size * 0.72 : 0;
  }

  function knockOutShark(shot) {
    if (!shark || shark.state !== 'swim') return;
    shark.state = 'spin';
    shark.spinTimer = 1.05;
    shark.angle = 0;
    shark.vx = clamp((shot ? shot.vx : shark.dir) * 0.035, -0.42, 0.42);
    shark.vy = -0.12;
    shark.blinkClosed = false;
    shark.blinkCount = 0;
    shark.blinkTimer = 0;
    shark.recoverTimer = 0;

    if (shot) shot.life = -1;
    hitEffects.push({
      kind:'mountain',
      x:shark.x,
      y:shark.y - shark.size * 0.45,
      life:0.62,
      max:0.62,
      text:'BONK!'
    });
  }


  function findFloatingPersonForShark() {
    if (!shark) return null;
    let best = null;
    let bestScore = Infinity;
    for (const person of fallingPeople) {
      if (!person || !person.active || person.state !== 'float') continue;
      const dx = person.x - shark.x;
      const dy = person.y - shark.y;
      const score = dx * dx + dy * dy;
      if (score < bestScore) {
        bestScore = score;
        best = person;
      }
    }
    return best;
  }

  function sharkMouthPoint() {
    if (!shark) return { x:0, y:0 };
    const facing = shark.dir >= 0 ? 1 : -1;
    const a = shark.angle || 0;
    return {
      x: shark.x + Math.cos(a) * facing * shark.size * 1.02,
      y: shark.y + Math.sin(a) * facing * shark.size * 1.02
    };
  }

  function angleForVelocity(vx, vy) {
    const dir = vx >= 0 ? 1 : -1;
    let angle = dir >= 0 ? Math.atan2(vy, vx || 1) : Math.atan2(vy, vx || -1) - Math.PI;
    while (angle > Math.PI) angle -= Math.PI * 2;
    while (angle < -Math.PI) angle += Math.PI * 2;
    return { dir, angle };
  }

  function cubicPoint(p0, p1, p2, p3, t) {
    const u = 1 - t;
    return {
      x: u * u * u * p0.x + 3 * u * u * t * p1.x + 3 * u * t * t * p2.x + t * t * t * p3.x,
      y: u * u * u * p0.y + 3 * u * u * t * p1.y + 3 * u * t * t * p2.y + t * t * t * p3.y
    };
  }

  function cubicTangent(p0, p1, p2, p3, t) {
    const u = 1 - t;
    return {
      x: 3 * u * u * (p1.x - p0.x) + 6 * u * t * (p2.x - p1.x) + 3 * t * t * (p3.x - p2.x),
      y: 3 * u * u * (p1.y - p0.y) + 6 * u * t * (p2.y - p1.y) + 3 * t * t * (p3.y - p2.y)
    };
  }

  function startSharkEatingPerson(person) {
    if (!shark || !person || !person.active) return;
    const surface = waterY(person.x);
    shark.state = 'eatPerson';
    shark.targetPerson = person;
    shark.dir = 1;
    shark.angle = -Math.PI / 2;
    shark.x = clamp(person.x, shark.size * 1.6, W - shark.size * 1.6);
    shark.y = clamp(surface + person.size * 0.60 + shark.size * 1.02, surface + shark.size * 0.82, H - shark.size * 0.45);
    shark.vx = 0;
    shark.vy = 0;
    shark.biteIndex = 0;
    shark.biteTimer = 0;

    person.state = 'beingEaten';
    person.eatenByShark = true;
    person.eatStartX = person.x;
    person.eatStartY = person.y;
    person.eatProgress = 0;
    person.eatBite = 0;
    person.vx = 0;
    person.vy = 0;
    person.angle = 0;
    person.life = Math.max(person.life || 0, 6);
  }

  function startSharkExitAfterEating() {
    if (!shark) return;
    const s = shark.size;
    const startX = clamp(shark.x, s * 1.4, W - s * 1.4);
    const startY = shark.y;
    const targetDepthY = sharkSwimTargetY(startX, s, shark.depth, 0);
    const endX = clamp(startX + s * 6.2, s * 1.4, W - s * 1.4);
    const endY = clamp(targetDepthY, waterY(endX) + s * 1.10, H - s * 0.70);

    shark.state = 'exitPerson';
    shark.targetPerson = null;
    shark.exitTimer = 0;
    shark.exitFlipDuration = 0.48;
    shark.exitSwimDuration = 1.35;
    shark.exitP0 = { x:startX, y:startY };
    shark.exitP1 = { x:startX, y:startY + s * 3.8 };
    shark.exitP2 = { x:lerp(startX, endX, 0.36), y:endY + s * 0.25 };
    shark.exitP3 = { x:endX, y:endY };
    shark.dir = 1;
    shark.angle = -Math.PI / 2;
    shark.vx = 0;
    shark.vy = 0;
  }

  function updateSharkHuntingPerson(dt, now) {
    if (!shark || (shark.state !== 'swim' && shark.state !== 'huntPerson')) return false;

    let person = shark.targetPerson;
    if (!person || !person.active || person.state !== 'float') {
      person = findFloatingPersonForShark();
      shark.targetPerson = person;
      if (person) shark.huntWobble = rand(0, Math.PI * 2);
    }
    if (!person) return false;

    shark.state = 'huntPerson';
    const s = shark.size;
    const surface = waterY(person.x);
    const finalX = clamp(person.x, s * 1.6, W - s * 1.6);
    const finalY = clamp(surface + person.size * 0.60 + s * 1.02, surface + s * 0.82, H - s * 0.45);
    const dxToPerson = finalX - shark.x;
    const closeT = 1 - clamp(Math.abs(dxToPerson) / Math.max(s * 6.5, W * 0.22), 0, 1);

    const cruiseY = sharkSwimTargetY(shark.x, s, shark.depth, Math.sin(now * 0.0021 + shark.wobble + (shark.huntWobble || 0)) * s * 0.20);
    const approachY = lerp(cruiseY, finalY, closeT * closeT);
    const leadX = finalX + Math.sin(now * 0.003 + (shark.huntWobble || 0)) * s * 0.10 * (1 - closeT);
    const dx = leadX - shark.x;
    const dy = approachY - shark.y;
    const dist = Math.max(1, Math.hypot(dx, dy));
    const desiredSpeed = lerp(W <= 760 ? 1.20 : 1.42, W <= 760 ? 2.08 : 2.42, closeT);
    const steer = clamp((0.055 + closeT * 0.090) * dt * 60, 0, 1);

    shark.vx = lerp(shark.vx, dx / dist * desiredSpeed, steer);
    shark.vy = lerp(shark.vy || 0, dy / dist * desiredSpeed, steer);
    shark.x += shark.vx * dt * 60;
    shark.y += shark.vy * dt * 60;
    shark.x = clamp(shark.x, s * 1.3, W - s * 1.3);
    shark.y = clamp(shark.y, waterY(shark.x) + s * 0.70, H - s * 0.42);

    const pose = angleForVelocity(shark.vx, shark.vy);
    shark.dir = pose.dir;
    const targetAngle = pose.angle + Math.sin(now * 0.0027 + shark.wobble) * 0.035 * (1 - closeT);
    shark.angle += (targetAngle - shark.angle) * clamp((0.090 + closeT * 0.080) * dt * 60, 0, 1);

    const mouth = sharkMouthPoint();
    if (Math.abs(finalX - shark.x) < person.size * 1.20 && Math.hypot(finalX - mouth.x, surface + person.size * 0.40 - mouth.y) < s * 1.05 && closeT > 0.82) {
      startSharkEatingPerson(person);
    }
    return true;
  }

  function updateSharkEatingPerson(dt) {
    if (!shark || shark.state !== 'eatPerson') return false;
    const person = shark.targetPerson;
    if (!person || !person.active || person.state !== 'beingEaten') {
      startSharkExitAfterEating();
      return true;
    }

    const surface = waterY(person.x);
    const biteDuration = 0.62;
    shark.biteTimer += dt;
    const localT = clamp(shark.biteTimer / biteDuration, 0, 1);
    const biteKick = Math.sin(localT * Math.PI) * shark.size * 0.16;
    const lockedX = clamp(person.eatStartX, shark.size * 1.6, W - shark.size * 1.6);
    const mouthBaseY = surface + person.size * 0.50;

    shark.dir = 1;
    shark.x = lockedX;
    shark.y = clamp(mouthBaseY + shark.size * 1.02 - biteKick, surface + shark.size * 0.78, H - shark.size * 0.45);
    shark.vx = 0;
    shark.vy = 0;
    shark.angle = -Math.PI / 2;

    const mouth = sharkMouthPoint();
    const stepStart = shark.biteIndex / 3;
    const stepEnd = (shark.biteIndex + 1) / 3;
    const pullT = localT < 0.24 ? 0 : (localT - 0.24) / 0.76;
    const pullEase = 1 - Math.pow(1 - clamp(pullT, 0, 1), 3);
    const progress = lerp(stepStart, stepEnd, pullEase);

    person.eatProgress = progress;
    person.eatBite = shark.biteIndex;
    person.x += (mouth.x - person.x) * 0.35 * dt * 60;
    person.y = lerp(person.eatStartY, mouth.y + person.size * 1.26, progress);
    person.angle = Math.sin(localT * Math.PI) * 0.16;
    person.flail += dt * (shark.biteIndex >= 2 ? 4 : 11);

    if (shark.biteTimer >= biteDuration) {
      shark.biteIndex++;
      shark.biteTimer = 0;
      person.eatStartX = person.x;
      person.eatStartY = person.y;
      if (shark.biteIndex >= 3) {
        person.active = false;
        startSharkExitAfterEating();
      }
    }
    return true;
  }

  function updateSharkExitAfterEating(dt, now) {
    if (!shark || shark.state !== 'exitPerson') return false;
    const s = shark.size;
    shark.exitTimer += dt;

    if (shark.exitTimer <= shark.exitFlipDuration) {
      const t = clamp(shark.exitTimer / shark.exitFlipDuration, 0, 1);
      const eased = t * t * (3 - 2 * t);
      shark.dir = 1;
      shark.vx = 0;
      shark.vy = 0;
      shark.x = shark.exitP0.x;
      shark.y = shark.exitP0.y + Math.sin(eased * Math.PI) * s * 0.08;
      // Flip directly from nose-up to nose-down. Do not flatten first.
      shark.angle = lerp(-Math.PI / 2, Math.PI / 2, eased);
      return true;
    }

    const swimT = clamp((shark.exitTimer - shark.exitFlipDuration) / shark.exitSwimDuration, 0, 1);
    const eased = swimT * swimT * (3 - 2 * swimT);
    const pos = cubicPoint(shark.exitP0, shark.exitP1, shark.exitP2, shark.exitP3, eased);
    const tangent = cubicTangent(shark.exitP0, shark.exitP1, shark.exitP2, shark.exitP3, eased);
    const wobble = Math.sin(now * 0.0065 + shark.wobble) * 0.045 * (1 - Math.abs(0.5 - swimT) * 1.2);

    shark.dir = 1;
    shark.x = clamp(pos.x, s * 1.3, W - s * 1.3);
    shark.y = clamp(pos.y, waterY(pos.x) + s * 0.70, H - s * 0.42);
    shark.vx = tangent.x / Math.max(1, shark.exitSwimDuration * 58);
    shark.vy = tangent.y / Math.max(1, shark.exitSwimDuration * 58);
    shark.angle = Math.atan2(tangent.y, tangent.x || 1) + wobble;

    if (swimT >= 1) {
      shark.state = 'swim';
      shark.dir = 1;
      shark.vx = W <= 760 ? 0.36 : 0.44;
      shark.vy = 0;
      shark.angle = Math.sin(now * 0.0025 + shark.wobble) * 0.055;
      keepSharkOutOfBoostControl();
    }
    return true;
  }

  function updateShark(dt, now) {
    if (!shark) return;
    const s = shark.size;

    if (updateSharkEatingPerson(dt)) return;
    if (updateSharkExitAfterEating(dt, now)) return;
    if (updateSharkHuntingPerson(dt, now)) return;

    if (shark.state === 'swim') {
      shark.x += shark.vx * dt * 60;
      if (shark.x < s * 1.3) {
        shark.x = s * 1.3;
        shark.vx = Math.abs(shark.vx);
        shark.dir = 1;
      } else if (shark.x > W - s * 1.3) {
        shark.x = W - s * 1.3;
        shark.vx = -Math.abs(shark.vx);
        shark.dir = -1;
      }

      const targetY = sharkSwimTargetY(shark.x, s, shark.depth, Math.sin(now * 0.0021 + shark.wobble) * s * 0.20);
      shark.y += (targetY - shark.y) * 0.060 * dt * 60;
      shark.angle = Math.sin(now * 0.0025 + shark.wobble) * 0.055;
      shark.dir = shark.vx >= 0 ? 1 : -1;
      keepSharkOutOfBoostControl();

      for (const shot of shots) {
        if (!shot || shot.life <= 0) continue;
        const fallingOrSinking = shot.wet || shot.vy > 0.45;
        if (!fallingOrSinking) continue;
        const dx = shot.x - shark.x;
        const dy = shot.y - shark.y;
        const ellipseX = s * 0.84 + shot.r;
        const ellipseY = s * 0.42 + shot.r;
        if ((dx * dx) / (ellipseX * ellipseX) + (dy * dy) / (ellipseY * ellipseY) <= 1) {
          knockOutShark(shot);
          break;
        }
      }
      return;
    }

    if (shark.state === 'spin') {
      const spinDuration = 1.05;
      shark.spinTimer -= dt;
      const t = clamp(1 - shark.spinTimer / spinDuration, 0, 1);
      const eased = 1 - Math.pow(1 - t, 2.2);
      // Rotate in one direction only. Three half-turns ends upside down, so
      // there is no backward correction or snap when the shark starts sinking.
      shark.angle = Math.PI * 3 * eased;
      shark.x += shark.vx * dt * 60;
      shark.y += shark.vy * dt * 60;
      shark.vy += 0.026 * dt * 60;
      shark.vx *= Math.pow(0.987, dt * 60);
      keepSharkOutOfBoostControl();
      if (shark.spinTimer <= 0) {
        shark.state = 'sink';
        shark.angle = Math.PI * 3;
        shark.vy = 0.18;
      }
      return;
    }

    if (shark.state === 'sink') {
      shark.angle = Math.PI * 3;
      shark.x += shark.vx * dt * 60;
      shark.vx *= Math.pow(0.982, dt * 60);
      shark.vy += (0.30 - shark.vy) * 0.045 * dt * 60;
      shark.y += shark.vy * dt * 60;
      keepSharkOutOfBoostControl();
      const bottom = sharkBottomY();
      if (shark.y >= bottom) {
        shark.y = bottom;
        shark.vy = 0;
        shark.state = 'rest';
        shark.restTimer = 1.0;
      }
      return;
    }

    if (shark.state === 'rest') {
      shark.angle = Math.PI * 3;
      shark.restTimer -= dt;
      if (shark.restTimer <= 0) {
        shark.state = 'blink';
        shark.blinkTimer = 0.12;
        shark.blinkCount = 0;
        shark.blinkClosed = true;
      }
      return;
    }

    if (shark.state === 'blink') {
      shark.angle = Math.PI * 3;
      shark.blinkTimer -= dt;
      if (shark.blinkTimer <= 0) {
        shark.blinkClosed = !shark.blinkClosed;
        shark.blinkTimer = shark.blinkClosed ? 0.12 : 0.22;
        if (!shark.blinkClosed) shark.blinkCount++;
        if (shark.blinkCount >= 2 && !shark.blinkClosed) {
          shark.state = 'recover';
          shark.recoverTimer = 1.15;
          shark.angle = Math.PI * 3;
        }
      }
      return;
    }

    if (shark.state === 'recover') {
      shark.recoverTimer -= dt;
      const t = clamp(1 - shark.recoverTimer / 1.15, 0, 1);
      const eased = t * t * (3 - 2 * t);
      // Continue rotating the same direction during recovery: 3pi is upside
      // down and 4pi is visually upright. No reverse spin.
      shark.angle = lerp(Math.PI * 3, Math.PI * 4, eased);
      const targetY = sharkSwimTargetY(shark.x, s, shark.depth, 0);
      shark.y += (targetY - shark.y) * 0.040 * dt * 60;
      keepSharkOutOfBoostControl();
      if (shark.recoverTimer <= 0) {
        shark.state = 'swim';
        shark.angle = 0;
        shark.vy = 0;
        if (Math.abs(shark.vx) < 0.18) shark.vx = shark.dir * rand(0.30, 0.44);
      }
    }
  }

  function reset(resetWaterToo) {
    gameOver = false;
    overlay.classList.remove("show");
    if (resetWaterToo) initWater();
    shots = [];
    splashes = [];
    hitEffects = [];
    balloons = [];
    bombs = [];
    fallingPeople = [];
    shark = null;
    balloonTimer = rand(3.5, 6.5);
    initMines();
    initShark();
    const s = boatSize();
    boats = [
      { kind:"player", x:W*0.24, y:waterY(W*0.24)-s*0.18, vx:0, vy:0, angle:0, av:0, hp:100, boostX:0, boostY:0, boostPower:0, boostAngle:-Math.PI/2, boostLocked:false, engineSpool:0 },
      { kind:"enemy", x:W*0.76, y:waterY(W*0.76)-s*0.18, vx:0, vy:0, angle:0, av:0, hp:100, boostX:0, boostY:0, boostPower:0, boostAngle:-Math.PI/2, boostLocked:false, engineSpool:0 }
    ];
    playerCooldown = 0;
    enemyTimer = 1.1;
    lastShotTime = 0;
    pointer.down = false;
    pointer.id = null;
    clearBooster();
    updateHud();
    updateStageButtons();
  }

  function setStage(i) {
    stage = i;
    closeStagePopover();
    reset(true);
  }

  function updateStageButtons() {
    stageButtons.forEach(btn => btn.classList.toggle("active", Number(btn.dataset.stage) === stage));
    if (stageMenuBtn) {
      stageMenuBtn.innerHTML = 'Change stage: <span class="stageMenuName" style="color:' + STAGE_COLORS[stage] + ';">' + STAGE_NAMES[stage] + '</span>';
    }
    if (stageMenuBtn) stageMenuBtn.setAttribute("aria-expanded", stagePopover.classList.contains("show") ? "true" : "false");
  }

  function closeStagePopover() {
    stagePopover.classList.remove("show");
    updateStageButtons();
  }

  function toggleStagePopover() {
    stagePopover.classList.toggle("show");
    updateStageButtons();
  }

  function waterY(x) {
    if (!water.length) return waterTop;
    const f = clamp(x / W, 0, 1) * (water.length - 1);
    const i = Math.floor(f);
    const t = f - i;
    const a = water[i] || water[0];
    const b = water[i+1] || a;
    return waterTop + lerp(a.y + a.base, b.y + b.base, t);
  }

  function waterVel(x) {
    if (!water.length) return 0;
    const f = clamp(x / W, 0, 1) * (water.length - 1);
    const i = Math.floor(f);
    const t = f - i;
    const a = water[i] || water[0];
    const b = water[i+1] || a;
    return lerp(a.v, b.v, t);
  }

  function waterSlope(x, span) {
    return (waterY(x + span) - waterY(x - span)) / Math.max(1, span * 2);
  }

  function mountainShape() {
    const top = waterTop - clamp(W * 0.105, 42, 76);
    const left = W * 0.405;
    const right = W * 0.595;
    const peak = W * 0.505;
    const water = waterTop + 10;
    const bottom = H + 90;
    return { top, left, right, peak, water, bottom };
  }

  function mountainSurfaceY(x) {
    const m = mountainShape();
    if (x < m.left || x > m.right) return Infinity;
    if (x <= m.peak) {
      const t = (x - m.left) / Math.max(1, m.peak - m.left);
      return lerp(m.water + 44, m.top, clamp(t, 0, 1));
    }
    const t = (x - m.peak) / Math.max(1, m.right - m.peak);
    return lerp(m.top, m.water + 58, clamp(t, 0, 1));
  }

  function hitMountain(sh) {
    if (stage !== 1) return false;
    const m = mountainShape();
    if (sh.x + sh.r < m.left || sh.x - sh.r > m.right) return false;
    const surfaceY = mountainSurfaceY(sh.x);
    return sh.y + sh.r >= surfaceY && sh.y - sh.r <= m.bottom;
  }

  function mountainSlopeAt(x) {
    const m = mountainShape();
    if (x < m.left || x > m.right) return 0;
    if (x <= m.peak) {
      return (m.top - (m.water + 44)) / Math.max(1, (m.peak - m.left));
    }
    return ((m.water + 58) - m.top) / Math.max(1, (m.right - m.peak));
  }

  function bounceMountain(sh) {
    if (stage !== 1 || (sh.mountainCd || 0) > 0 || !hitMountain(sh)) return false;

    const hitY = mountainSurfaceY(sh.x);
    const slope = mountainSlopeAt(sh.x);

    // Surface normal pointing out of the mountain.
    let nx = slope;
    let ny = -1;
    const nLen = Math.hypot(nx, ny) || 1;
    nx /= nLen;
    ny /= nLen;

    const dot = sh.vx * nx + sh.vy * ny;
    const bounce = sh.wet ? 0.56 : 0.84;

    if (dot < 0) {
      sh.vx = (sh.vx - 2 * dot * nx) * bounce;
      sh.vy = (sh.vy - 2 * dot * ny) * bounce;
    } else {
      sh.vx += nx * 0.8;
      sh.vy += ny * 0.8;
    }

    // Push the rock back outside the mountain so it does not get stuck re-colliding.
    const push = sh.r + 3;
    sh.x += nx * push;
    sh.y += ny * push;
    sh.y = Math.min(sh.y, hitY - sh.r - 1);

    sh.mountainCd = 0.08;

    hitEffects.push({
      kind: "mountain",
      x: sh.x,
      y: Math.min(sh.y, hitY),
      life: 0.35,
      max: 0.35,
      text: "CLACK!"
    });

    return true;
  }

  function disturbWater(x, power, radius) {
    if (!water.length) return;
    const center = clamp(Math.round((x / W) * (water.length - 1)), 0, water.length - 1);
    const r = clamp(Math.round(radius / W * water.length), 5, 30);
    for (let k = -r; k <= r; k++) {
      const idx = center + k;
      if (idx < 0 || idx >= water.length) continue;
      const d = Math.abs(k) / r;
      const falloff = Math.pow(Math.cos(d * Math.PI * 0.5), 2);
      if (d < 0.30) {
        water[idx].v += power * 0.46 * falloff;
        water[idx].y += power * 0.24 * falloff;
      } else {
        // Keep the initial splash size the user liked, but reduce the harsh outer counter-kick
        // so the wave train smooths out instead of turning jittery.
        water[idx].v -= power * 0.09 * falloff;
        water[idx].y -= power * 0.035 * falloff;
      }
    }
  }

  function updateWater(dt, now) {
    const n = water.length;
    if (!n) return;

    if (stage === 2) {
      for (let i = 0; i < n; i++) {
        const x = i / (n - 1) * W;
        water[i].base = Math.sin(now * 0.00155 + x * 0.025) * 3.0 + Math.sin(now * 0.00100 + x * 0.012) * 1.8;
      }
    } else {
      for (let i = 0; i < n; i++) water[i].base *= Math.pow(0.95, dt * 60);
    }

    // Slightly heavier, more damped surface so the dissipation looks less jiggly.
    const stiffness = 0.022;
    const spread = 0.064;
    const damping = 0.985;
    const passes = 5;
    const smoothBlend = 0.18;

    for (let i = 0; i < n; i++) {
      const w = water[i];
      w.v += -w.y * stiffness * dt * 60;
      w.v *= Math.pow(damping, dt * 60);
    }

    for (let p = 0; p < passes; p++) {
      const delta = new Array(n).fill(0);
      for (let i = 0; i < n; i++) {
        if (i > 0) delta[i-1] += (water[i].y - water[i-1].y) * spread;
        if (i < n-1) delta[i+1] += (water[i].y - water[i+1].y) * spread;
      }

      if (stage === 1) {
        const cx = Math.floor(n / 2);
        const block = Math.max(4, Math.round(n * 0.045));
        for (let k = -block; k <= block; k++) {
          const idx = cx + k;
          if (idx > 0 && idx < n-1) delta[idx] *= 0.18;
        }
      }

      for (let i = 0; i < n; i++) water[i].v += delta[i] * dt * 60;
    }

    for (let i = 0; i < n; i++) {
      water[i].y += water[i].v * dt * 60;
    }

    // A light low-pass smoothing pass removes the high-frequency jiggle while
    // keeping the broader wave shape and interference behavior.
    for (let pass = 0; pass < 2; pass++) {
      const smooth = water.map((w, i) => {
        const prev = water[i - 1] ? water[i - 1].y : w.y;
        const next = water[i + 1] ? water[i + 1].y : w.y;
        return (prev + w.y * 2 + next) / 4;
      });
      for (let i = 1; i < n - 1; i++) {
        water[i].y = lerp(water[i].y, smooth[i], smoothBlend);
      }
    }

    // Heavy wall reflection at the sides.
    water[0].v += (water[1].y - water[0].y) * 0.10;
    water[n-1].v += (water[n-2].y - water[n-1].y) * 0.10;
  }

  function updateBoats(dt, now) {
    const s = boatSize();
    const playerBoost = getPlayerBoostControl();
    const enemyBoost = getEnemyBoostControl(now);

    for (const b of boats) {
      const left = waterY(b.x - s*0.46);
      const mid = waterY(b.x);
      const right = waterY(b.x + s*0.46);
      const targetY = mid - s * 0.18;
      const targetAng = clamp((right - left) / (s * 1.2), -0.55, 0.55);

      // Positive when the boat is below its natural floating line.
      const belowSurface = b.y - targetY;
      const waterContact = clamp((belowSurface + s * 0.90) / (s * 1.80), 0, 1);
      const nearSurface = 1 - clamp(Math.abs(b.y - targetY) / (s * 1.55), 0, 1);

      const control = b.kind === 'player' ? playerBoost : enemyBoost;

      b.boostX = lerp(b.boostX || 0, control.x, 0.32);
      b.boostY = lerp(b.boostY || 0, control.y, 0.32);
      b.boostPower = lerp(b.boostPower || 0, control.power, 0.30);

      // Engine spool gives the sustained rocket feel: hold boost and thrust ramps up,
      // release boost and it winds down. There is intentionally no ceiling lock here;
      // a held booster should keep pushing against the top clamp until released.
      b.engineSpool = b.engineSpool || 0;
      const targetSpool = control.power <= 0.03 ? 0 : 1;
      b.engineSpool = lerp(b.engineSpool, targetSpool, targetSpool ? 0.075 : 0.22);

      if (Math.abs(b.boostX) > 0.001 || Math.abs(b.boostY) > 0.001) {
        b.boostAngle = Math.atan2(b.boostY, b.boostX);
      }

      // Heavier airborne behavior. In the air, gravity should dominate unless the
      // rocket is held continuously. The waterline spring is only allowed to act
      // when the hull is actually touching or under the water, so the boat falls
      // like a heavy object instead of being gently dragged back to the surface.
      const airGravity = 0.135;
      const waterGravity = 0.070;
      const gravity = lerp(airGravity, waterGravity, waterContact);
      b.vy += gravity * dt * 60;

      // Water impact should not bounce. On first contact, keep the downward motion
      // but bleed off speed so the hull punches below the surface before buoyancy
      // has time to push it back up.
      const wasInWater = !!b.wasInWater;
      const inWater = waterContact > 0.08;
      if (!wasInWater && inWater && b.vy > 1.6) {
        const impactDamping = clamp(0.72 - b.vy * 0.018, 0.42, 0.68);
        b.vy *= impactDamping;
        disturbWater(b.x, clamp(b.vy * 2.2, 3.0, 14.0), s * 1.15);
      }
      b.wasInWater = inWater;

      // Buoyancy is deliberately progressive. A small dip does little, but as the
      // boat submerges the upward force gets stronger. This creates a sink-then-rise
      // feel instead of a hard ricochet off the water surface.
      const submerge = clamp((b.y - targetY + s * 0.28) / (s * 1.35), 0, 1);
      const buoyancy = Math.pow(submerge, 1.22) * 0.155;
      b.vy -= buoyancy * dt * 60;

      // The old floating correction remains, but much softer and only in water.
      // That preserves the existing water feel while preventing sky-fall bouncing.
      b.vy += (targetY - b.y) * (waterContact * 0.021) * dt * 60;
      b.vy += waterVel(b.x) * 0.012 * waterContact * dt * 60;

      // Continuous propulsion. boostX/boostY is the nozzle direction; thrust is opposite.
      // Full down-pull now acts like a heavy rocket launch: the force is constant,
      // but much weaker than before, so speed builds gradually over several seconds.
      const nozzleLen = Math.hypot(b.boostX || 0, b.boostY || 0) || 1;
      const nozzleX = (b.boostX || 0) / nozzleLen;
      const nozzleY = (b.boostY || 0) / nozzleLen;
      const throttle = (b.boostPower || 0) * (0.42 + b.engineSpool * 0.78);
      const boostAccel = 0.145 * throttle;
      b.vx -= nozzleX * boostAccel * dt * 60;
      b.vy -= nozzleY * boostAccel * dt * 60;

      // Treat rocket thrust as acting through the boat's center of mass.
      // The booster should push the whole boat, not hang the hull from an off-center
      // pivot point. That means rocket thrust adds translation only; it does not
      // directly torque the boat toward the joystick/nozzle angle. Water and the
      // hull's self-righting behavior handle rotation instead.
      if (throttle > 0.025) {
        b.av *= Math.pow(0.965, dt * 60);
      }

      // Surface slope still moves the boat while it is actually in the water.
      const slope = waterSlope(b.x, s);
      b.vx += clamp(slope, -0.18, 0.18) * 0.18 * waterContact * dt * 60;

      // Stable center-of-gravity correction. In flat still water targetAng is exactly 0,
      // so the deck settles parallel to the water instead of resting nose-up/nose-down.
      // This is strongest when floating, softer when deeply submerged, and absent in air.
      const rightingStrength = waterContact * lerp(0.030, 0.062, nearSurface);
      b.av += (targetAng - b.angle) * rightingStrength * dt * 60;

      // Light air drag keeps flight smooth. Stronger water drag absorbs impact energy
      // without reversing velocity, so falling into water feels like splashing in,
      // not bouncing off a rubber floor.
      const vxDamp = Math.pow(lerp(0.9985, 0.940, waterContact), dt * 60);
      const vyDamp = Math.pow(lerp(0.9992, 0.835, waterContact), dt * 60);
      const avDamp = Math.pow(lerp(0.982, 0.865, waterContact), dt * 60);
      b.vx *= vxDamp;
      b.vy *= vyDamp;
      b.av *= avDamp;

      // Stop a strong buoyancy rise from launching the boat back out of the water.
      if (waterContact > 0.20 && b.vy < -2.1) b.vy = -2.1;

      b.x += b.vx * dt * 60;
      b.y += b.vy * dt * 60;
      b.angle += b.av * dt * 60;

      if (b.x < s*1.4) {
        b.x = s*1.4;
        b.vx = Math.abs(b.vx) * 0.75;
      } else if (b.x > W - s*1.4) {
        b.x = W - s*1.4;
        b.vx = -Math.abs(b.vx) * 0.75;
      }

      if (b.y < 86) {
        // Hard ceiling clamp. Do not bounce, disable, or lock the booster.
        // If thrust keeps pushing upward, the boat stays pinned here with zero vertical speed.
        // When the player releases the booster, gravity takes over and the boat falls normally.
        b.y = 86;
        if (b.vy < 0) b.vy = 0;
      }

      if (b.y > gameBottom - 30) {
        b.y = gameBottom - 30;
        b.vy = -Math.abs(b.vy) * 0.35;
      }

      b.angle = clamp(b.angle, -2.6, 2.6);
    }
  }

  function slingshotAnchor(b) {
    const s = boatSize();
    const dir = b.kind === "player" ? 1 : -1;
    return {
      x: b.x + Math.cos(b.angle) * dir * s * 0.36,
      y: b.y + Math.sin(b.angle) * dir * s * 0.08 - s * 0.54
    };
  }

  function spawnShot(owner, x, y, vx, vy) {
    shots.push({ owner, x, y, vx, vy, r:clamp(W*0.006, 3.2, 5.5), wet:false, sinkTime:0, entryVy:0, terminalSink:0, mountainCd:0, life:22 });
    lastShotTime = performance.now();
  }

  function firePlayer() {
    if (gameOver || playerCooldown > 0) return;
    const b = boats[0];
    const aim = playerLaunchVector();
    const pull = aim.pull;
    if (pull < 12) {
      // Tap/short pull still makes a tiny splash shot so it is obvious controls work.
      const tilted = rotateVec(5.5, -7.0, b.angle * 1.35);
      spawnShot("player", aim.anchor.x + 4, aim.anchor.y - 4, tilted.x, tilted.y);
      playerCooldown = 0.55;
      return;
    }
    const cap = W <= 760 ? 260 : 340;
    const scale = Math.min(pull, cap) / Math.max(1, pull);
    const power = W <= 760 ? 0.082 : 0.092;
    spawnShot("player", aim.anchor.x + 4, aim.anchor.y - 4, aim.x * scale * power, aim.y * scale * power);
    b.vx += aim.dx * 0.000018;
    b.vy += aim.dy * 0.000009;
    playerCooldown = 0.65;
  }

  function fireEnemy(dt) {
    if (gameOver) return;
    enemyTimer -= dt;
    if (enemyTimer > 0) return;

    const e = boats[1];
    const p = boats[0];
    const a = slingshotAnchor(e);
    const dx = p.x - a.x;
    const dy = (p.y - 20) - a.y;
    const dist = Math.max(1, Math.hypot(dx, dy));
    const speed = clamp(dist / 52, 6.5, 13.5);
    spawnShot("enemy", a.x - 4, a.y - 4, dx / dist * speed + rand(-1.4, 1.4), dy / dist * speed - clamp(dist / 92, 4.2, 8.0) + rand(-0.5, 0.5));
    e.vx -= 0.10;
    enemyTimer = rand(2.1, 3.0);
  }

  function updateShots(dt) {
    const gravity = 0.26;
    for (const sh of shots) {
      sh.life -= dt;
      sh.mountainCd = Math.max(0, (sh.mountainCd || 0) - dt);
      sh.vy += gravity * dt * 60;
      sh.vx *= Math.pow(0.998, dt * 60);
      sh.vy *= Math.pow(0.999, dt * 60);
      sh.x += sh.vx * dt * 60;
      sh.y += sh.vy * dt * 60;

      // Side-wall ricochet. Rocks can no longer leave through the left/right edges.
      // This makes bank shots possible, and a bounce can still come back and hit you.
      if (sh.x - sh.r < 0) {
        sh.x = sh.r;
        sh.vx = Math.abs(sh.vx) * (sh.wet ? 0.42 : 0.82);
        sh.vy *= sh.wet ? 0.86 : 0.96;
        disturbWater(sh.x, sh.wet ? 1.8 : 3.2, 12);
      } else if (sh.x + sh.r > W) {
        sh.x = W - sh.r;
        sh.vx = -Math.abs(sh.vx) * (sh.wet ? 0.42 : 0.82);
        sh.vy *= sh.wet ? 0.86 : 0.96;
        disturbWater(sh.x, sh.wet ? 1.8 : 3.2, 12);
      }

      const surf = waterY(sh.x);
      if (!sh.wet && sh.y + sh.r >= surf) {
        sh.wet = true;
        sh.sinkTime = 0;
        const speed = Math.hypot(sh.vx, sh.vy);
        const power = clamp(speed * 0.75 + Math.max(0, sh.vy) * 0.55, 3, 20);
        disturbWater(sh.x, power, clamp(speed * 2.8, 16, 42));
        splashes.push({ x:sh.x, y:surf, life:0.55, max:0.55, power });

        // Cartoon-heavy water: the rock still punches below the surface, but the
        // water has a lot of "weight" and almost immediately clamps it to a slow sink.
        sh.entryVy = Math.max(0.35, sh.vy);
        sh.terminalSink = clamp(0.105 + Math.abs(sh.vy) * 0.006, 0.14, 0.30);
        sh.vx *= 0.32;
        sh.vy = clamp(sh.vy * 0.16, 0.12, 0.70);
      }

      if (sh.wet) {
        sh.sinkTime += dt;
        const depth = clamp(sh.y - surf, 0, 220);

        // Very high water drag and a low terminal sink speed. This is intentionally
        // more cartoon-readable than realistic: the rock feels light inside heavy water.
        const terminal = sh.terminalSink || 0.20;
        const depthDrag = 0.050 + depth * 0.00095;
        const upwardResistance = clamp(depth / 90, 0, 1) * 0.016;
        const slowSinkPull = 0.004 + clamp(sh.sinkTime / 6.0, 0, 1) * 0.006;

        sh.vx *= Math.pow(0.942, dt * 60);

        if (sh.vy > terminal) {
          sh.vy -= (sh.vy - terminal) * depthDrag * dt * 60;
        } else {
          sh.vy += (terminal - sh.vy) * 0.010 * dt * 60;
        }

        sh.vy += (slowSinkPull - upwardResistance) * dt * 60;
        sh.vy = clamp(sh.vy, -0.18, terminal + 0.08);
        sh.vy *= Math.pow(0.992, dt * 60);

        // Leave it visible for a long time, then fade/shrink only after it has had
        // plenty of time to drift downward.
        if (sh.sinkTime > 8.5) {
          sh.r *= Math.pow(0.992, dt * 60);
        }
      }

      for (const mine of mines) {
        if (!mine.active) continue;
        const hitRange = mine.r + sh.r + 5;
        if (Math.hypot(sh.x - mine.x, sh.y - mine.y) <= hitRange) {
          explodeMine(mine, sh);
          break;
        }
      }
      if (sh.life <= 0) continue;

      for (const bomb of bombs) {
        if (!bomb.active) continue;
        const hitRange = bomb.r + sh.r + 5;
        if (Math.hypot(sh.x - bomb.x, sh.y - bomb.y) <= hitRange) {
          explodeBomb(bomb, sh, 'BOOM!');
          break;
        }
      }
      if (sh.life <= 0) continue;

      for (const balloon of balloons) {
        if (!balloon.active) continue;
        const bodyHit = Math.hypot(sh.x - balloon.x, sh.y - balloon.y) <= balloon.size * 0.62 + sh.r;
        const basketHit = Math.abs(sh.x - balloon.x) <= balloon.size * 0.34 && Math.abs(sh.y - (balloon.y + balloon.size * 0.88)) <= balloon.size * 0.28 + sh.r;
        if (bodyHit || basketHit) {
          explodeBalloon(balloon, sh);
          break;
        }
      }
      if (sh.life <= 0) continue;

      for (const b of boats) {
        if (b.kind === sh.owner) continue;
        const s = boatSize();
        const hitX = b.x;
        const hitY = b.y - s*0.15;
        if (Math.hypot(sh.x - hitX, sh.y - hitY) < s * 0.62) {
          const speed = Math.hypot(sh.vx, sh.vy);
          b.hp = clamp(b.hp - clamp(4 + speed * 0.55, 3, 10), 0, 100);
          b.vx += sh.vx * 0.018;
          b.vy += sh.vy * 0.006;
          b.av += sh.vx * 0.002;
          disturbWater(b.x, 4.0, 14);
          hitEffects.push({
            kind: "boat",
            x: hitX,
            y: hitY - s * 0.10,
            life: 0.48,
            max: 0.48,
            text: speed > 10 ? "BONK!" : "HIT!"
          });
          sh.life = -1;
          updateHud();
          checkGameOver();
        }
      }

      if (bounceMountain(sh)) {
        // Ricochet handled above. The shot stays alive and can still hit boats after bouncing.
      }

      if (sh.y > H + 220 || sh.y < -220 || sh.r < 1.2) sh.life = -1;
    }
    shots = shots.filter(s => s.life > 0);
    mines = mines.filter(m => m.active);
    for (const sp of splashes) sp.life -= dt;
    splashes = splashes.filter(s => s.life > 0);
    for (const fx of hitEffects) fx.life -= dt;
    hitEffects = hitEffects.filter(fx => fx.life > 0);
  }

  function updateHud() {
    const p = Math.round(boats[0] ? boats[0].hp : 100);
    const e = Math.round(boats[1] ? boats[1].hp : 100);
    playerHpText.textContent = p;
    enemyHpText.textContent = e;
    playerHp.style.transform = "scaleX(" + (p/100) + ")";
    enemyHp.style.transform = "scaleX(" + (e/100) + ")";
  }

  function checkGameOver() {
    if (gameOver) return;
    if (boats[0].hp <= 0 || boats[1].hp <= 0) {
      gameOver = true;
      closeStagePopover();
      overlayTitle.textContent = boats[1].hp <= 0 ? "You win!" : "You sank!";
      overlayText.textContent = boats[1].hp <= 0 ? "The enemy boat took too many hits." : "The CPU boat got you.";
      overlay.classList.add("show");
    }
  }

  function update(dt, now) {
    if (gameOver) return;
    frames++;
    playerCooldown = Math.max(0, playerCooldown - dt);
    updateWater(dt, now);
    updateBoats(dt, now);
    updateShark(dt, now);
    updateBalloons(dt, now);
    updateFallingPeople(dt, now);
    updateBombs(dt);
    updateShots(dt);
    fireEnemy(dt);
  }

  function drawPaper() {
    ctx.fillStyle = "#f6f1e6";
    ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.strokeStyle = "#171717";
    ctx.lineWidth = 2;
    for (let x = -H; x < W + H; x += 34) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x + H, H);
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawWater() {
    const grad = ctx.createLinearGradient(0, waterTop, 0, H);
    grad.addColorStop(0, "#d7f6ff");
    grad.addColorStop(1, "#bce5ef");
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(0, waterY(0));
    for (let i = 0; i < water.length; i++) {
      const x = i / (water.length - 1) * W;
      ctx.lineTo(x, waterTop + water[i].y + water[i].base);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "#171717";
    ctx.lineWidth = 4;
    ctx.beginPath();
    for (let i = 0; i < water.length; i++) {
      const x = i / (water.length - 1) * W;
      const y = waterTop + water[i].y + water[i].base;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    ctx.save();
    ctx.globalAlpha = .28;
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#171717";
    for (let row = 0; row < 5; row++) {
      const y = waterTop + 85 + row * 70;
      ctx.beginPath();
      for (let x = 0; x <= W; x += 16) {
        const yy = y + Math.sin(x * 0.026 + row * 1.7 + performance.now() * 0.001) * 5;
        if (x === 0) ctx.moveTo(x, yy);
        else ctx.lineTo(x, yy);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawRock() {
    if (stage !== 1) return;
    const m = mountainShape();

    ctx.save();
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.strokeStyle = "#171717";
    ctx.lineWidth = 4;

    // Draw the underwater mountain first. It is a real obstacle:
    // wide below the surface, narrow peak above the water.
    const grad = ctx.createLinearGradient(0, m.top, 0, H);
    grad.addColorStop(0, "rgba(150, 144, 125, .98)");
    grad.addColorStop(0.34, "rgba(126, 137, 124, .82)");
    grad.addColorStop(1, "rgba(96, 125, 126, .48)");

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.moveTo(m.left - W * 0.08, H + 70);
    ctx.lineTo(m.left, m.water + 44);
    ctx.lineTo(m.left + W * 0.035, m.water - 8);
    ctx.lineTo(m.peak - W * 0.030, m.top + 18);
    ctx.lineTo(m.peak, m.top);
    ctx.lineTo(m.peak + W * 0.036, m.top + 22);
    ctx.lineTo(m.right - W * 0.030, m.water + 4);
    ctx.lineTo(m.right, m.water + 58);
    ctx.lineTo(m.right + W * 0.09, H + 70);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Above-water crag cap, so it is obvious shots cannot pass over/through it.
    ctx.fillStyle = "rgba(158, 150, 128, .98)";
    ctx.beginPath();
    ctx.moveTo(m.left + W * 0.030, m.water + 2);
    ctx.lineTo(m.left + W * 0.070, m.water - 28);
    ctx.lineTo(m.peak - W * 0.024, m.top + 16);
    ctx.lineTo(m.peak, m.top - 2);
    ctx.lineTo(m.peak + W * 0.034, m.top + 22);
    ctx.lineTo(m.right - W * 0.058, m.water - 24);
    ctx.lineTo(m.right - W * 0.025, m.water + 8);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Rock facet lines.
    ctx.globalAlpha = 0.62;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(m.peak, m.top + 10);
    ctx.lineTo(m.peak - W * 0.048, m.water + 70);
    ctx.moveTo(m.peak + W * 0.018, m.top + 22);
    ctx.lineTo(m.peak + W * 0.055, m.water + 80);
    ctx.moveTo(m.left + W * 0.055, m.water + 28);
    ctx.lineTo(m.peak - W * 0.020, m.top + 46);
    ctx.moveTo(m.right - W * 0.052, m.water + 42);
    ctx.lineTo(m.peak + W * 0.030, m.top + 54);
    ctx.stroke();

    // Subtle underwater contour lines.
    ctx.globalAlpha = 0.30;
    ctx.lineWidth = 3;
    for (let i = 0; i < 3; i++) {
      const y = m.water + 95 + i * 56;
      ctx.beginPath();
      ctx.moveTo(m.left - W * 0.02 + i * 8, y);
      ctx.quadraticCurveTo(m.peak, y + 20, m.right + W * 0.03 - i * 8, y + 3);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawBoat(b) {
    const s = boatSize();
    const dir = b.kind === "player" ? 1 : -1;
    const fill = b.kind === "player" ? "rgba(255,244,199,.98)" : "rgba(255,226,226,.98)";
    const accent = b.kind === "player" ? "rgba(255,177,61,.96)" : "rgba(255,104,104,.92)";

    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.angle);
    ctx.lineCap = "round";
    ctx.lineJoin = "round";
    ctx.strokeStyle = "#171717";

    ctx.lineWidth = W <= 760 ? 3.2 : 4;
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.moveTo(-s*0.72, -s*0.08);
    ctx.lineTo(s*0.72, -s*0.08);
    ctx.quadraticCurveTo(s*0.50, s*0.43, 0, s*0.40);
    ctx.quadraticCurveTo(-s*0.50, s*0.43, -s*0.72, -s*0.08);
    ctx.closePath();
    ctx.fill();
